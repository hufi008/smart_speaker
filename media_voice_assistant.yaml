substitutions:
  name: "esphome-web-f407a0"
  friendly_name: "Smart Speaker 2"
  version: "0.2.2"
  media_player_entity_id: "media_player.smart_speaker_2_audio_player"

  # Pin-Belegung
  # Amp Max98357
  amp_lrclk_pin : "GPIO11"   # LEFT / RIGHT CLOCK
  amp_bclk_pin  : "GPIO10"   # Bit CLOCK
  amp_din_pin   : "GPIO09"   # DATA IN

  # Microphone INMP441
  mic_ws_pin   : "GPIO04"   # WORD SELECT
  mic_sck_pin  : "GPIO05"   # SERIAL CLOCK
  mic_sd_pin   : "GPIO06"   # SERIAL DATA

  # LED Strip WS2812
  led_din_pin  : "GPIO08"    # DATA IN
  led_count    : "10"        # Number of LEDs

  # I2C
  i2c_sda_pin  : "GPIO01"    # SERIAL DATA
  i2c_scl_pin  : "GPIO02"    # SERIAL CLOCK

  # Environment BME280
  bme_addr     : "0x76"

  # Display OLED SSD1306
  ssd_addr     : "0x3C"

  # Button TTP221
  btn_1_pin    : "GPIO15"
  btn_2_pin    : "GPIO16"
  btn_3_pin    : "GPIO17"
  btn_4_pin    : "GPIO18"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  min_version: 2024.6.0
  name_add_mac_suffix: false
  project:
    name: "thorsten.voice_satellite"
    version: "${version}"
  platformio_options:
    board_build.arduino.memory_type: qio_opi
    board_build.flash_mode: dio
    board_build.partitions: "../../../default_16MB.csv"
    build_flags:
      - "-DBOARD_HAS_PSRAM" 
      - "-DUSE_I2S_PORT_1"
      - "-I ../../../"
  includes:
    - display_modes.h
  on_boot:
    - priority: 600
      then:
        - globals.set:
            id: is_booting
            value: 'true'
    # früh
    - priority: 600
      then:
        - script.execute: on_esphome_boot_600
    - priority: 200
      then:
        - script.execute: on_esphome_boot_200
    # spät
    - priority: -100
      then:
        - script.execute: on_esphome_boot_minus100

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  cpu_frequency: 240MHZ
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

wifi:
  id: wifi_id
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${name} AP
  on_connect:
    then:
      - script.execute: on_wifi_connect
  on_disconnect:
    then:
      - script.execute: on_wifi_disconnect

# Notfallseite, wenn Wifi nicht erreichbar
captive_portal:

api:
  id: api_id
  encryption:
    key: !secret api_encryption_key
  on_client_connected:
      - script.execute: on_api_client_connect
  on_client_disconnected:
      - script.execute: on_api_client_disconnect

ota:
  - platform: esphome
    allow_partition_access: true

logger:
  level: DEBUG
  logs:
    light: INFO
    voice_assistant: INFO
    micro_wake_word: INFO
    speaker_media_player: INFO
    speaker_mixer: INFO
    i2s_audio: INFO
    i2c: INFO

time:
  - platform: homeassistant
    id: esptime
    # Schaltet die Boot-Seite lautlos um, sobald die Zeit synchronisiert ist
    on_time_sync:
      then:
        - if:
            condition:
              lambda: 'return id(is_booting);'
            then:
              - globals.set:
                  id: is_booting
                  value: 'false'
              - logger.log: "Booting finished"
              - script.execute:
                  id: set_content_mode
                  mode: CONTENT_IDLE
            else:
              - logger.log: "on_time_time_sync NOT_in_boot_state"
        - script.execute: on_time_time_sync


###################################################################################
# Hardware
###################################################################################

# I2S Bus
i2s_audio:
  # Eingang (Stereo INMP441)
  - id: i2s_bus_in
    i2s_lrclk_pin: ${mic_ws_pin}
    i2s_bclk_pin:  ${mic_sck_pin}

  # Ausgang (Stereo MAX98357)
  - id: i2s_bus_out
    i2s_lrclk_pin: ${amp_lrclk_pin}
    i2s_bclk_pin:  ${amp_bclk_pin}

# Microphone INMP441
microphone:
  - platform: i2s_audio
    id: hw_microphone
    i2s_audio_id: i2s_bus_in
    adc_type: external
    i2s_din_pin: ${mic_sd_pin}
    pdm: false
    bits_per_sample: 32bit
    sample_rate: 16000
    mclk_multiple: 256
    channel: stereo
    num_channels: 2

# Amplifier MAX98357
speaker:
  # A) Der physische I2S Hardware-Lautsprecher (Ausgang)
  - platform: i2s_audio
    id: hw_speaker
    i2s_audio_id: i2s_bus_out
    dac_type: external
    i2s_dout_pin: ${amp_din_pin}
    bits_per_sample: 16bit
    sample_rate: 48000
    channel: stereo
    buffer_duration: 100ms
      

  # B) Der digitale Audio-Mixer
  - platform: mixer
    id: audio_mixer
    output_speaker: hw_speaker
    num_channels: 2
    source_speakers:
      - id: media_mixing_input
        timeout: never
      - id: announcement_mixing_input
        timeout: never

  # C) Virtueller Resampler für Musik-Medien
  - platform: resampler
    id: media_source_speaker
    output_speaker: media_mixing_input

  # D) Virtueller Resampler für Durchsagen (Announcements)
  - platform: resampler
    id: announcement_source_speaker
    output_speaker: announcement_mixing_input
    
# LED Strip WS2812
light:
  - platform: esp32_rmt_led_strip
    id: hw_leds
    pin: ${led_din_pin}
    num_leds: ${led_count}
    rgb_order: GRB
    chipset: ws2812
    rmt_symbols: 48
    max_refresh_rate: 50ms      
    restore_mode: RESTORE_DEFAULT_ON
    name: "Status"
    effects:
      # User Effects for Light
      - addressable_rainbow:
          name: "Rainbow"
      - addressable_scan:
          name: "Scan"
      - addressable_twinkle:
          name: "Twinkle"
      - addressable_color_wipe:
          name: "Color Wipe"
      - pulse:
          name: "Pulse"
      - pulse:
          name: "Soft Pulse"
          transition_length: 800ms
          update_interval: 20ms
          min_brightness: 10%
          max_brightness: 80%
      - addressable_lambda:
          name: "Warm Glow"
          update_interval: 40ms
          lambda: |-
            static uint8_t t = 0;
            t += 2;
            float b = (sin(t / 20.0f) + 1.0f) * 0.4f + 0.2f;
            for (int i = 0; i < it.size(); i++) {
              it[i] = esphome::Color(255 * b, 120 * b, 20 * b);
            }
      - addressable_scan:
          name: "Sweep"
          move_interval: 40ms
          scan_width: 4
      - addressable_lambda:
          name: "Neon Ring"
          update_interval: 30ms
          lambda: |-
            static uint16_t pos = 0;
            pos++;
            for (int i = 0; i < it.size(); i++) {
              float d = fabs((i - pos) % it.size());
              float b = exp(-d * 0.25f);
              it[i] = esphome::Color(0, 255 * b, 180 * b);
            }
      - addressable_rainbow:
          name: "Soft Rainbow"
          speed: 4
          width: 80
      - addressable_lambda:
          name: "Sparkle Fade"
          update_interval: 25ms
          lambda: |-
            for (int i = 0; i < it.size(); i++) {
              it[i].fade_to_black(20);
            }
            int p = random_uint32() % it.size();
            it[p] = esphome::Color(255, 255, 255);
      - pulse:
          name: "Breathing Blue"
          transition_length: 1200ms
          update_interval: 20ms
          min_brightness: 5%
          max_brightness: 60%
      - addressable_lambda:
          name: "Thinking Dots"
          update_interval: 60ms
          lambda: |-
            static uint8_t t = 0;
            t++;
            for (int i = 0; i < it.size(); i++) {
              float b = (sin((i + t) / 2.5f) + 1.0f) * 0.5f;
              it[i] = esphome::Color(0, 100 * b, 255 * b);
            }
      - addressable_lambda:
          name: "Blue White"
          update_interval: 30ms
          lambda: |-
            float t = (sin(millis() / 200.0f) + 1) / 2;  // 0–1 Puls
            uint8_t b = 100 + (uint8_t)(t * 155);        // 100–255

            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(b, b, 255);  // helles Blau-Weiß
            }
      - addressable_lambda:
          name: "Green Power"
          update_interval: 40ms
          lambda: |-
            int count = it.size();
            float t = (sin(millis() / 150.0f) + 1) / 2;  // 0–1
            int level = (int)(t * count);

            for (int i = 0; i < count; i++) {
              if (i < level) {
                it[i] = Color(0, 200, 50);  // grün
              } else {
                it[i] = Color(0, 20, 5);    // dunkles Grün
              }
            }

      # Content Mode Effects
      # Effect CONTENT_BOOT
      - addressable_lambda:
          name: "Effect CONTENT_BOOT"
          update_interval: 50ms
          lambda: |-
            int value = 16 + (millis() / 40);
            if (value > 255) value = 255;

            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(0, 0, value);
            }
      # Effect CONTENT_IDLE
      - addressable_lambda:
          name: "Effect CONTENT_IDLE"
          update_interval: 30ms
          lambda: |-
            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(0, 0, 0);
            }
      # Effect CONTENT_LISTEN
      - addressable_lambda:
          name: "Effect CONTENT_LISTEN"
          update_interval: 20ms
          lambda: |-
            const int count = ${led_count};

            // Position des Scans (läuft von 0 bis count-1)
            int pos = (millis() / 40) % count;

            for (int i = 0; i < count; i++) {
              // Abstand zur Scan-Position
              int d = abs(i - pos);

              // Helligkeit abhängig vom Abstand (weicher Abfall)
              int b = max(0, 180 - d * 60);  // 180 = hell, 60 = Abfall pro LED

              it[i] = esphome::Color(0, b, 255);  // Cyan-Blau
            }
      # Effect CONTENT_THINK
      - addressable_lambda:
          name: "Effect CONTENT_THINK"
          update_interval: 20ms
          lambda: |-
            int pos = (millis() / 40) % it.size();
            pos = it.size() - pos;
            for (int i = 0; i < it.size(); i++) {
              int d = abs(i - pos);
              int b = max(0, 150 - d * 40);
              it[i] = Color(b, 0, b);
            }
      # Effect CONTENT_PLAY
      - addressable_rainbow:
          name: "Effect CONTENT_PLAY"
          speed: 16
          width: 12
      # Effect CONTENT_PAUSE
      - addressable_lambda:
          name: "Effect CONTENT_PAUSE"
          update_interval: 50ms
          lambda: |-
            float t = (sin(millis() / 500.0f) + 1) / 2;  // langsames Atmen
            uint8_t y = 60 + (uint8_t)(t * 120);

            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(y, y, 0);  // Gelb
            }
      # Effect CONTENT_ALARM
      - addressable_lambda:
          name: "Effect CONTENT_ALARM"
          update_interval: 50ms
          lambda: |-
            float t = (sin(millis() / 250.0f) + 1) / 2;  // langsames Atmen
            uint8_t y = 60 + (uint8_t)(t * 120);

            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(y, 0, 0);  // Rot
            }

      # Overlay Mode Effects
      - addressable_lambda:
          name: "Effect OVERLAY_NONE"
          update_interval: 250ms
          lambda: |-
            for (int i = 0; i < it.size(); i++) {
              it[i] = esphome::Color(0,0,0);
            }
      # Effect OVERLAY_VOLUME
      - addressable_lambda:
          name: "Effect OVERLAY_VOLUME"
          update_interval: 20ms
          lambda: |-
            if (id(hw_media_player).is_muted()) {
              float t = (millis() % 800) / 800.0f;
              float fade = (sin(t * 2 * 3.14159f) + 1) / 2;  // 0–1
              for (int i = 0; i < it.size(); i++) {
                it[i] = Color(0, 0, int(128 * fade));
              }
              return;
            }

            float index = id(hw_media_player).volume * it.size();

            for (int i = 0; i < it.size(); i++) {
              float fade = std::clamp(index - i, 0.2f, 1.0f);
              // falschrum eingebaut
              it[it.size()-1-i] = esphome::Color(0, int(127*fade), int(255*fade));
            }
      # Effect OVERLAY_ERROR
      - addressable_lambda:
          name: "Effect OVERLAY_ERROR"
          update_interval: 40ms
          lambda: |-
            float t = (millis() % 800) / 800.0f;
            float b = (sin(t * 2 * 3.14159f) + 1) / 2;  // 0–1
            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(int(200 * b), 0, 0);
            }
      # Effect OVERLAY_ANNOUNCE
      - addressable_lambda:
          name: "Effect OVERLAY_ANNOUNCE"
          update_interval: 20ms
          lambda: |-
            const int count = ${led_count};

            // Position des Scans (läuft von 0 bis count-1)
            int pos = (millis() / 40) % count;

            for (int i = 0; i < count; i++) {
              // Abstand zur Scan-Position
              int d = abs(i - pos);

              // Helligkeit abhängig vom Abstand (weicher Abfall)
              int b = max(0, 180 - d * 60);  // 180 = hell, 60 = Abfall pro LED

              it[i] = esphome::Color(b+75, b, b+75);  // Cyan-Blau
            }
            
# I2C Bus
i2c:
  sda: ${i2c_sda_pin}
  scl: ${i2c_scl_pin}
  scan: true
  frequency: 400kHz

# Sensoren - sowohl echte, als auch virtuelle
# Climate BME280
sensor:
  # Wifi Informationen
  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi Signal dB"
    update_interval: 30s
  - platform: template
    id: wifi_channel
    name: "Channel"
    icon: "mdi:wifi-marker"
    entity_category: diagnostic
    lambda: |-
      if (id(wifi_id).is_connected())
        return id(wifi_id).get_wifi_channel();
      return -1;    
    update_interval: 30s
  # Umweltdaten
  - platform: bme280_i2c
    address: ${bme_addr}
    temperature:
      id: room_temp
      name: "Temperatur"
    humidity:
      id: room_hum
      name: "Luftfeuchte"
    pressure:
      id: room_press
      name: "Luftdruck"
    update_interval: 30s

