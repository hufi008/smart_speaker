# globals - Application Variablen
globals:
  - id: is_booting
    type: bool
    restore_value: False
    initial_value: "true"
  - id: content_mode
    type: int
    restore_value: False
    initial_value: CONTENT_BOOT
  - id: overlay_mode
    type: int
    restore_value: False
    initial_value: OVERLAY_NONE

  - id: idle_message
    type: std::string
    initial_value: "\"--:--\""
  - id: command_message
    type: std::string
    initial_value: "\"command\""
  - id: announce_message
    type: std::string
    initial_value: "\"announce\""
  - id: error_message
    type: std::string
    initial_value: "\"error\""

# configuration - Bedienelemente im HA - Gerät
button:
  - platform: restart
    id: restart_button
    name: "Restart Device"
  - platform: template
    name: "Stop"
    id: btn_media_stop
    on_press:
      - media_player.stop: hw_media_player
      - script.execute:
          id: set_content_mode
          mode:  CONTENT_IDLE
number:
  - platform: template
    id: page_info_duration
    name: "Info Speed"
    entity_category: config
    min_value: 15
    max_value: 300
    step: 15
    initial_value: 60
    optimistic: true
    restore_value: True
    set_action:
      - lambda: |-
          id(overlay_mode) = int(x);
          id(display_id).update();
select:
  - platform: template
    id: content_mode_select
    name: "Content Mode"
    entity_category: diagnostic
    initial_option: "BOOT"
    icon: "mdi:fullscreen"
    optimistic: true
    options:
      - "BOOT"
      - "IDLE"
      - "LISTEN"
      - "THINK"
      - "PLAY"
      - "PAUSE"
      - "ALARM"
    set_action:
      - lambda: |-
          // Wandelt den Text (x) in die passende Zahl um
          int idx = string_to_content_mode_int(x);

          id(set_content_mode).execute(idx);
  - platform: template
    id: overlay_mode_select
    name: "Overlay Mode"
    entity_category: diagnostic
    initial_option: "NONE"
    icon: "mdi:fullscreen"
    optimistic: true
    options:
      - "NONE"
      - "VOLUME"
      - "ERROR"
      - "ANNOUNCE"
    set_action:
      - lambda: |-
          // Wandelt den Text (x) in die passende Zahl um
          int idx = string_to_overlay_mode_int(x);

          id(set_overlay_mode).execute(idx);

# Zentrale Stelle für Systemreaktionen
script:
  - id: play_ui_sound
    parameters:
      sound_name: string
    then:
      - logger.log: "script play_ui_sound"
      - media_player.enqueue:
          id: hw_media_player
          media_url: !lambda |-
            return "audio-file://" + sound_name;
          announcement: True

  - id: set_content_mode
    parameters:
      mode: int
    then:
      - logger.log:
          format: "script set_content_mode %s"
          args: [ "content_mode_to_string(mode)" ]
      - lambda: |-
          // in der Bootphase wird nix geschaltet
          if (id(is_booting)) return;

          // Mode setzen
          id(content_mode) = mode;
          // mit HA synchronisieren
          id(content_mode_select).publish_state(mode);

          if (id(overlay_mode) != OVERLAY_NONE) return;

          // LED-Effekt auswählen -- CONTENT_MODE
          std::string effect = std::string("Effect CONTENT_") + content_mode_to_string(mode);

          id(hw_leds).turn_on().set_effect(effect).perform();

          // Display aktualisieren
          id(display_id).update();
  - id: set_overlay_mode
    parameters:
      mode: int
    then:
      - logger.log:
          format: "script set_overlay_mode %s"
          args: [ "overlay_mode_to_string(mode)"]
      - lambda: |-
          // in der Bootphase wird nix geschaltet
          if (id(is_booting)) return;

          // Mode setzen
          id(overlay_mode) = mode;
          // mit HA synchronisieren
          id(overlay_mode_select).publish_state(mode);

          if(id(overlay_mode) == OVERLAY_NONE) {
            mode = id(content_mode);
            // LED-Effekt auswählen -- CONTENT_MODE
            std::string effect = std::string("Effect CONTENT_") + content_mode_to_string(mode);

            id(hw_leds).turn_on().set_effect(effect).perform();
          } else {
            // LED-Effekt auswählen -- OVERLAY_MODE
            std::string effect = std::string("Effect OVERLAY_") + overlay_mode_to_string(mode);

            id(hw_leds).turn_on().set_effect(effect).perform();
          }

          // Display aktualisieren
          id(display_id).update();
  - id: show_volume_overlay
    mode: restart
    then:
      - logger.log:
          format: "script show_volume_overlay"
      - lambda: |-
          id(set_overlay_mode).execute(OVERLAY_VOLUME);
      - delay: 5s
      - lambda: |-
          id(set_overlay_mode).execute(OVERLAY_NONE);

  - id: show_error_overlay
    mode: restart
    parameters:
      msg: string
    then:
      - logger.log:
          format: "script show_error_overlay %s"
          args: [msg.c_str()]
      - lambda: |-
          id(error_message) = msg;
          id(set_overlay_mode).execute(OVERLAY_ERROR);
      - delay: 5s
      - lambda: |-
          id(set_overlay_mode).execute(OVERLAY_NONE);
  - id: show_announce_overlay
    mode: restart
    then:
      - logger.log:
          format: "script show_announce_overlay %s"
          args: [id(announce_message).c_str()]
      - lambda: |-
          // Overlay einschalten
          id(set_overlay_mode).execute(OVERLAY_ANNOUNCE);

      # Warten bis Announcement wirklich gestartet ist
      - wait_until:
          condition:
            media_player.is_announcing: hw_media_player

      # Warten bis Announcement vorbei ist
      - wait_until:
          condition:
            not:
              media_player.is_announcing: hw_media_player

      - lambda: |-
          // Overlay ausschalten
          id(set_overlay_mode).execute(OVERLAY_NONE);

# esphome:
  - id: on_esphome_boot_600
    then:
      - logger.log: "on_esphome_boot_600"
  - id: on_esphome_boot_200
    then:
      - logger.log: "on_esphome_boot_200"
      - script.execute:
          id: set_content_mode
          mode: CONTENT_BOOT
  - id: on_esphome_boot_minus100
    then: 
      - logger.log: "on_esphome_boot_minus100"
      - logger.log: "Warte auf Media Player..."
      # Wartet dynamisch, bis der Player bereit und untätig im Speicher liegt
      - wait_until:
          condition:
            media_player.is_idle: hw_media_player
      
      - logger.log: "Media Player ist bereit! Spiele Boot-Sound."
      - script.execute:
          id: play_ui_sound
          sound_name: "snd_wake"
      # - media_player.play_media:
      #     id: hw_media_player
      #     media_url: "audio-file://snd_boot"
      #     announcement: True
# wifi
  - id: on_wifi_connect
    then:
      - logger.log: "on_wifi_connect"
  - id: on_wifi_disconnect
    then:
      - logger.log: "on_wifi_disconnect"
# api
  - id: on_api_client_connect
    then:
      - logger.log: "on_api_client_connect"

  - id: on_api_client_disconnect
    then:
      - logger.log: "on_api_client_disconnect"
# time
  - id: on_time_time_sync
    then:
      - logger.log: "on_time_time_sync"

# media_player
  - id: on_media_player_sound
    then:
      - logger.log: "on_media_player_sound"

  - id: on_media_player_announcement
    then:
      - logger.log: "on_media_player_announcement"
      # VA antwortet → Announce
      - script.execute:
          id: show_announce_overlay

  - id: on_media_player_play
    then:
      - logger.log: "on_media_player_play"
      # MP spielt Media → Play
      # - script.execute:
      #     id: play_ui_sound
      #     sound_name: "snd_play"
      - micro_wake_word.stop:
      - script.execute:
          id: set_content_mode
          mode: CONTENT_PLAY

  - id: on_media_player_pause
    then:
      - logger.log: "on_media_player_pause"
      # MP pausiert Media → Pause
      # - script.execute:
      #     id: play_ui_sound
      #     sound_name: "snd_pause"
      - script.execute:
          id: set_content_mode
          mode: CONTENT_PAUSE

  - id: on_media_player_idle
    then:
      - logger.log: "on_media_player_idle"
      - delay: 500ms
      - if:
          condition:
            not:
              micro_wake_word.is_running:
          then:
            - micro_wake_word.start:
      # MP hat keine Media → Idle
      - script.execute:
          id: set_content_mode
          mode: CONTENT_IDLE

  - id: on_media_player_turn_on
    then:
      - logger.log: "on_media_player_turn_on"
      # MP an → Idle
      - script.execute:
          id: set_content_mode
          mode: CONTENT_IDLE

  - id: on_media_player_turn_off
    then:
      - logger.log: "on_media_player_turn_off"
      # MP aus → Idle
      - script.execute:
          id: set_content_mode
          mode: CONTENT_IDLE

  - id: on_media_player_mute
    then:
      - logger.log: "on_media_player_mute"
      - script.execute:
          id: show_volume_overlay

  - id: on_media_player_unmute
    then:
      - logger.log: "on_media_player_unmute"
      - script.execute:
          id: show_volume_overlay

  - id: on_media_player_volume
    then:
      - logger.log: "on_media_player_volume"
      - script.execute:
          id: show_volume_overlay

  - id: on_media_player_state
    then:
      - logger.log:
          format: "on_media_player_state: %s"
          args: [ 'media_player::media_player_state_to_string(id(hw_media_player).state)' ]


# voice_assistant
  - id: on_voice_assistant_client_connect
    then:
      - logger.log: "on_voice_assistant_client_connect"
      - script.execute:
          id: play_ui_sound
          sound_name: "snd_turn_on"
      - micro_wake_word.start:

  - id: on_voice_assistant_client_disconnect
    then:
      - logger.log: "on_voice_assistant_client_disconnect"
      - script.execute:
          id: play_ui_sound
          sound_name: "snd_turn_off"
      - micro_wake_word.stop:

  - id: on_voice_assistant_listening
    then:
      - logger.log: "on_voice_assistant_Listening"
      # - script.execute:
      #     id: play_ui_sound
      #     sound_name: "snd_wake"
      - script.execute:
          id: set_content_mode
          mode: CONTENT_LISTEN

  - id: on_voice_assistant_start
    then:
      - logger.log: "on_voice_assistant_start"
      - lambda: |-          
          id(command_message) = "";
          id(announce_message) = "";
          id(error_message) = "";


  - id: on_voice_assistant_stt_end
    parameters:
      command: string
    then:
      - lambda: |-
          id(command_message) = "Q:" + command;
      - logger.log:
          format: "on_voice_assistant_stt_end: %s"
          args: [command.c_str()]
      - component.update: display_id

  - id: on_voice_assistant_stt_vad_start
    then:
      - logger.log: "voice_assistant on_vad_start"
      - script.execute:
          id: set_content_mode
          mode: CONTENT_THINK

  - id: on_voice_assistant_stt_vad_end
    then:
      - logger.log: "voice_assistant on_stt_vad_end"

  - id: on_voice_assistant_tts_start
    parameters:
      announce: string
    then:
      - lambda: |-
          id(announce_message) = "A:" + announce;
      - logger.log:
          format: "on_voice_assistant_tts_start: %s"
          args: [announce.c_str()]
      - micro_wake_word.stop:

  - id: on_voice_assistant_tts_end
    parameters:
      url: string
    then:
      - logger.log:
          format: "on_voice_assistant_tts_end: %s"
          args: [url.c_str()]

  - id: on_voice_assistant_idle
    then:
      - logger.log: "on_voice_assistant_idle"

  - id: on_voice_assistant_end
    then:
      - logger.log: "on_voice_assistant_end"
      - script.execute:
          id: play_ui_sound
          sound_name: "snd_success"
      # - script.execute:
      #     id: set_content_mode
      #     mode: CONTENT_IDLE
      - micro_wake_word.start:

  - id: on_voice_assistant_error
    parameters:
      code: string
      error: string
    then:
      - logger.log:
          format: "on_voice_assistant_error %d %s"
          args: [code.c_str(), error.c_str()]
      - media_player.play_media:
          id: hw_media_player
          media_url: "audio-file://snd_error"
          announcement: True
      - script.execute:
          id: set_content_mode
          mode: CONTENT_IDLE
      - script.execute:
          id: show_error_overlay
          msg: !lambda |-
            return code + ": " + error;
      - micro_wake_word.start:

# micro_wake_word
  - id: on_micro_wake_word_detected
    parameters:
      wake_word : string
    then:
      - logger.log: "on_micro_wake_word_detected"
      # VA hört zu → Listening
      # - script.execute:
      #     id: play_ui_sound
      #     sound_name: "snd_wake"
      # - delay: 0.2s
      - voice_assistant.start:
          wake_word: !lambda return wake_word;

# binary_sensor:
# Button Up - Play/Pause - - Stop
  - id: on_btn_1_single_click
    then:
      - logger.log: "on_btn1_single_click"
      - script.execute:
          id: play_ui_sound
          sound_name: "snd_pause"
      - media_player.toggle: hw_media_player
  - id: on_btn_1_double_click
    then:
      - logger.log: "on_btn1_double_click"
  - id: on_btn_1_long_click
    then:
      - logger.log: "on_btn1_long_click"
      - media_player.stop: hw_media_player
  # Button Down - - - Power
  - id: on_btn_2_single_click
    then:
      - logger.log: "on_btn2_single_click"
  - id: on_btn_2_double_click
    then:
      - logger.log: "on_btn2_double_click"
  - id: on_btn_2_long_click
    then:
      - logger.log: "on_btn2_long_click"
      - if:
            condition:
              - media_player.is_off: hw_media_player
            then:
              - media_player.turn_on: hw_media_player
            else:
              - media_player.turn_off: hw_media_player
  # Button Left - Vol- - mute -
  - id: on_btn_3_single_click
    then:
      - logger.log: "on_btn3_single_click"
      - media_player.volume_down: hw_media_player
  - id: on_btn_3_double_click
    then:
      - logger.log: "on_btn3_double_click"
  - id: on_btn_3_long_click
    then:
      - logger.log: "on_btn3_long_click"
      - if:
            condition:
              - media_player.is_muted: hw_media_player
            then:
              - media_player.unmute: hw_media_player
            else:
              - media_player.mute: hw_media_player
  # Button Right - Vol+ - -
  - id: on_btn_4_single_click
    then:
      - logger.log: "on_btn4_single_click"
      - media_player.volume_up: hw_media_player
  - id: on_btn_4_double_click
    then:
      - logger.log: "on_btn4_double_click"
  - id: on_btn_4_long_click
    then:
      - logger.log: "on_btn4_long_click"
      - script.execute:
          id: play_ui_sound
          sound_name: "snd_wake"
      # - media_player.play_media:
      #     id: hw_media_player
      #     media_url: "audio-file://snd_wake"
      #     announcement: True
