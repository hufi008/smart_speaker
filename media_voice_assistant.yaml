substitutions:
  name: "esphome-web-f407a0"
  friendly_name: "Smart Speaker 2"
  version: "0.2.2"

  # Pin-Belegung
  # Amp Max98357
  amp_lrclk_pin : "GPIO11"   # LEFT / RIGHT CLOCK
  amp_bclk_pin  : "GPIO10"   # Bit CLOCK
  amp_din_pin   : "GPIO09"   # DATA IN

  # Microphone INMP441
  mic_ws_pin   : "GPIO04"   # WORD SELECT
  mic_sck_pin  : "GPIO05"   # SERIAL CLOCK
  mic_sd_pin   : "GPIO06"   # SERIAL DATA

  # LED Strip WS2812
  led_din_pin  : "GPIO08"    # DATA IN
  led_count    : "10"        # Number of LEDs

  # I2C
  i2c_sda_pin  : "GPIO01"    # SERIAL DATA
  i2c_scl_pin  : "GPIO02"    # SERIAL CLOCK

  # Environment BME280
  bme_addr     : "0x76"

  # Display OLED SSD1306
  ssd_addr     : "0x3C"

  # Button TTP221
  btn_1_pin    : "GPIO15"
  btn_2_pin    : "GPIO16"
  btn_3_pin    : "GPIO17"
  btn_4_pin    : "GPIO18"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  min_version: 2024.6.0
  name_add_mac_suffix: false
  project:
    name: "thorsten.voice_satellite"
    version: "${version}"
  platformio_options:
    board_build.arduino.memory_type: qio_opi
    board_build.flash_mode: dio
    build_flags: "-DBOARD_HAS_PSRAM"
  on_boot:
    priority: 200
    then:
      - logger.log: "esphome on_boot"
      # Boot-Modus aktivieren (niedrigste Priorität = -1)
      - script.execute:
          id: set_content_mode
          mode: -1

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  cpu_frequency: 240MHZ
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

wifi:
  id: wifi_id
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    then:
      - logger.log: "wifi on_connect"
  on_disconnect:
    then:
      - logger.log: "wifi on_disconnect"

api:
  id: api_id
  encryption:
    key: !secret api_encryption_key
  on_client_connected:
    then:
      - logger.log: "api on_client_connect"
      - lambda: |-
          float vol = id(volume_number).state / 100.0f;
          ESP_LOGI("boot", "Restored HA volume_number: %.1f", vol); 
          id(hw_speaker)->set_volume(vol);
          ESP_LOGI("boot", "Setting speaker volume to %.2f", vol);

  on_client_disconnected:
    then:
      - logger.log: "api on_client_disconnect"

ota:
  - platform: esphome

logger:
  level: DEBUG

time:
  - platform: homeassistant
    id: esptime
    # Schaltet die Boot-Seite lautlos um, sobald die Zeit synchronisiert ist
    on_time_sync:
      then:
        - logger.log: "Time on_time_sync"
        - delay: 222ms
        # Zeit ist da → Boot verlassen → Idle (0)
        - script.execute:
            id: set_content_mode
            mode: 0

###################################################################################
# Hardware
###################################################################################

# I2S Bus
i2s_audio:
  # Eingang (Stereo INMP441)
  - id: i2s_bus_in
    i2s_lrclk_pin: ${mic_ws_pin}
    i2s_bclk_pin:  ${mic_sck_pin}

  # Ausgang (Stereo MAX98357)
  - id: i2s_bus_out
    i2s_lrclk_pin: ${amp_lrclk_pin}
    i2s_bclk_pin:  ${amp_bclk_pin}

# Microphone INMP441
microphone:
  - platform: i2s_audio
    id: hw_microphone
    i2s_audio_id: i2s_bus_in
    adc_type: external
    i2s_din_pin: ${mic_sd_pin}
    pdm: false
    bits_per_sample: 32bit
    sample_rate: 16000
    mclk_multiple: 256
    channel: stereo
    num_channels: 2

# Amplifier MAX98357
speaker:
  # A) Der physische I2S Hardware-Lautsprecher (Ausgang)
  - platform: i2s_audio
    id: hw_speaker
    i2s_audio_id: i2s_bus_out
    dac_type: external
    i2s_dout_pin: ${amp_din_pin}
    bits_per_sample: 16bit
    sample_rate: 48000
    channel: stereo

  # B) Der digitale Audio-Mixer
  - platform: mixer
    id: audio_mixer
    output_speaker: hw_speaker
    num_channels: 2
    source_speakers:
      - id: media_mixing_input
        timeout: never
      - id: announcement_mixing_input
        timeout: never

  # C) Virtueller Resampler für Musik-Medien
  - platform: resampler
    id: media_source_speaker
    output_speaker: media_mixing_input

  # D) Virtueller Resampler für Durchsagen (Announcements)
  - platform: resampler
    id: announcement_source_speaker
    output_speaker: announcement_mixing_input

# LED Strip WS2812
light:
  - platform: esp32_rmt_led_strip
    id: hw_leds
    pin: ${led_din_pin}
    num_leds: ${led_count}
    rgb_order: GRB
    chipset: ws2812
    name: "Status"
    effects:
      - addressable_rainbow:
          name: "Rainbow"
      - addressable_scan:
          name: "Scan"
      - addressable_twinkle:
          name: "Twinkle"
      - addressable_color_wipe:
          name: "Color Wipe"
      - pulse:
          name: "Pulse"
          min_brightness: 25%
          max_brightness: 75%
          transition_length: 1s
          update_interval: 2s
      # Effect Mode -1 - Booting
      - addressable_lambda:
          name: "Effect Content -1"
          update_interval: 50ms
          lambda: |-
            int value = 16 + (millis() / 40);
            if (value > 255) value = 255;

            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(0, 0, value);
            }
      # Content Mode Effects
      # Effect Mode 0 - Idle
      - addressable_lambda:
          name: "Effect Content 0"
          update_interval: 30ms
          lambda: |-
            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(0, 0, 0);
            }
      # Effect Mode 1 - Listening
      - addressable_lambda:
          name: "Effect Content 1"
          update_interval: 20ms
          lambda: |-
            const int count = ${led_count};

            // Position des Scans (läuft von 0 bis count-1)
            int pos = (millis() / 40) % count;

            for (int i = 0; i < count; i++) {
              // Abstand zur Scan-Position
              int d = abs(i - pos);

              // Helligkeit abhängig vom Abstand (weicher Abfall)
              int b = max(0, 180 - d * 60);  // 180 = hell, 60 = Abfall pro LED

              it[i] = esphome::Color(0, b, 255);  // Cyan-Blau
            }
      # Effect Mode 2 - Thinking
      - addressable_lambda:
          name: "Effect Content 2"
          update_interval: 20ms
          lambda: |-
            int pos = (millis() / 40) % it.size();
            for (int i = 0; i < it.size(); i++) {
              int d = abs(i - pos);
              int b = max(0, 150 - d * 40);
              it[i] = Color(b, 0, b);
            }
      # Effect Mode 3 - Speaking
      - addressable_lambda:
          name: "Effect Content 3"
          update_interval: 30ms
          lambda: |-
            for (int i = 0; i < it.size(); i++) {
              float h = (sin((millis() / 150.0f) + i * 0.5f) + 1) / 2;  // 0–1
              it[i] = Color(int(255 * h), int(180 * h), 0);
            }
      # Effect Mode 4 - Player
      - addressable_lambda:
          name: "Effect Content 4"
          update_interval: 80ms
          lambda: |-
            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(0, 40, 120);  // ruhiges Blau
            }
      # Effect Mode 5 - MP Announing
      - addressable_lambda:
          name: "Effect Content 5"
          update_interval: 30ms
          lambda: |-
            float t = (sin(millis() / 200.0f) + 1) / 2;  // 0–1 Puls
            uint8_t b = 100 + (uint8_t)(t * 155);        // 100–255

            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(b, b, 255);  // helles Blau-Weiß
            }
      # Effect Mode 6 - MP Playing
      - addressable_lambda:
          name: "Effect Content 6"
          update_interval: 40ms
          lambda: |-
            int count = it.size();
            float t = (sin(millis() / 150.0f) + 1) / 2;  // 0–1
            int level = (int)(t * count);

            for (int i = 0; i < count; i++) {
              if (i < level) {
                it[i] = Color(0, 200, 50);  // grün
              } else {
                it[i] = Color(0, 20, 5);    // dunkles Grün
              }
            }
      # Effect Mode 7 - MP Pasing
      - addressable_lambda:
          name: "Effect Content 7"
          update_interval: 50ms
          lambda: |-
            float t = (sin(millis() / 500.0f) + 1) / 2;  // langsames Atmen
            uint8_t y = (uint8_t)(t * 180);

            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(y, y, 0);  // Gelb
            }



      # Overlay Mode Effects
      # Effect Mode 1 - Volume Overlay
      - addressable_lambda:
          name: "Effect Overlay 1"
          update_interval: 20ms
          lambda: |-
            float vol = id(hw_speaker)->get_volume();
            if (id(hw_speaker)->get_mute_state()) {
              vol = 0.0f;
            }

            // Weicher Übergang (Easing)
            static float smooth = 0.0f;
            smooth += (vol - smooth) * 0.15f;

            const int count = ${led_count};
            float led_index_exact = smooth * count;

            for (int i = 0; i < count; i++) {
              // LEDs rückwärts (rechts → links)
              int target_index = (count - 1) - i;

              float fade = 0.0f;

              if (target_index < led_index_exact) {
                fade = 1.0f;  // voll an
              } else if (target_index == (int)led_index_exact) {
                fade = led_index_exact - (int)led_index_exact;  // Übergangs‑LED
              }

              it[i] = esphome::Color(
                (uint8_t)(0   * fade),
                (uint8_t)(150 * fade),
                (uint8_t)(255 * fade)
              );
            }
      # Effect Mode 2 - Error Overlay
      - addressable_lambda:
          name: "Effect Overlay 2"
          update_interval: 40ms
          lambda: |-
            float t = (millis() % 800) / 800.0f;
            float b = (sin(t * 2 * 3.14159f) + 1) / 2;  // 0–1
            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(int(200 * b), 0, 0);
            }
            
# I2C Bus
i2c:
  sda: ${i2c_sda_pin}
  scl: ${i2c_scl_pin}
  scan: true
  frequency: 400kHz

# Climate BME280
sensor:
  - platform: wifi_signal
    id: wifi_rssi
    update_interval: 30s
  - platform: bme280_i2c
    address: ${bme_addr}
    temperature:
      id: room_temp
      name: "Temperatur"
    humidity:
      id: room_hum
      name: "Luftfeuchte"
    pressure:
      id: room_press
      name: "Luftdruck"
    update_interval: 30s


# Buttons TTP223
binary_sensor:
  - platform: gpio
    id: btn_up
    pin: ${btn_1_pin}

  - platform: gpio
    id: btn_down
    pin: ${btn_2_pin}

  - platform: gpio
    id: btn_left
    pin: ${btn_3_pin}
    on_click:
      - lambda: |-
          float vol = id(hw_speaker)->get_volume();
          vol -= 0.05;
          if (vol < 0.0f) vol = 0.0f;
          id(hw_speaker)->set_volume(vol);  
          id(volume_number).publish_state(vol * 100.0f);
          id(show_volume_overlay).execute();

  - platform: gpio
    id: btn_right
    pin: ${btn_4_pin}
    on_click:
      - lambda: |-
          float vol = id(hw_speaker)->get_volume();
          vol += 0.05;
          if (vol > 1.0f) vol = 1.0f;
          id(hw_speaker)->set_volume(vol);
          id(volume_number).publish_state(vol * 100.0f);
          id(show_volume_overlay).execute();

