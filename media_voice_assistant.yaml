# Fonts
font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 9

  - file: "gfonts://Roboto"
    id: font_medium
    size: 14

  - file: "gfonts://Roboto"
    id: font_large
    size: 22

  - file: "gfonts://Roboto"
    id: font_huge
    size: 28

# Display ssd1306
display:
  - platform: ssd1306_i2c
    id: display_id
    model: "SSD1306 128x64"
    update_interval: 200ms
    lambda: |-
      // -------------------------------------------------------
      // 1a. GELBER HEADER-BEREICH (Pixel 0–15)
      // -------------------------------------------------------

      // Icons rechts (jeweils 16x16)
      // WiFi Signalstärke
      if (id(wifi_id).is_connected()) {
          //it.image(112, 0, id(icon_wifi));
          float strength = id(wifi_rssi).state;

          if (strength > -55)
              it.image(112, 0, id(icon_wifi_4));
          else if (strength > -65)
              it.image(112, 0, id(icon_wifi_3));
          else if (strength > -75)
              it.image(112, 0, id(icon_wifi_2));
          else
              it.image(112, 0, id(icon_wifi_1));
      }

      if (id(api_id).is_connected()) {
        if (id(va).get_api_connection() != nullptr)
          it.image(96, 0, id(icon_va));
        else
          it.image(96, 0, id(icon_api));
      }

      if (id(hw_media_player).state == media_player::MEDIA_PLAYER_STATE_IDLE)
        it.image(80, 0, id(icon_mp_idle));
      else if (id(hw_media_player).state == media_player::MEDIA_PLAYER_STATE_PLAYING)
        it.image(80, 0, id(icon_mp_play));
      else if (id(hw_media_player).state == media_player::MEDIA_PLAYER_STATE_PAUSED)
        it.image(80, 0, id(icon_mp_pause));
      else if (id(hw_media_player).state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING)
        it.image(80, 0, id(icon_mp_announce));

      if (id(hw_speaker)->get_mute_state())
        it.image(64, 0, id(icon_mute));
      if (id(hw_microphone)->get_mute_state())
        it.image(48, 0, id(icon_deaf));

      // -------------------------------------------------------
      // 1b. BLAUER CONTENT-BEREICH (Pixel 16–63)
      // -------------------------------------------------------
      // Trennlinie zwischen GELB (oben) und BLAU (unten)
      it.line(0, 16, 128, 16);



      // Positionen
      constexpr int y0 = 46;
      constexpr int y1 = 32;
      constexpr int y2 = 56;
      constexpr int xc = 128 / 2;
      constexpr int yc = 64 / 2;

      // -------------------------------------------------------
      // 2. OVERLAY ENGINE
      // -------------------------------------------------------
      // Overlays haben Vorrang
      switch (id(overlay_mode)) {

        // -------------------------
        // 1: VOLUME OVERLAY
        // -------------------------
        case 1: {
          it.print(0, 0, id(font_medium), "VOLUME");
          it.image(0, y1, id(icon_volume));

          float vol = id(hw_speaker)->get_volume();
          it.printf(xc+16, y1, id(font_medium), TextAlign::CENTER, "VOL %.0f%%", vol * 100.0f);
          it.filled_rectangle(40, 50, vol * 80, 14);
          return;
        }

        // -------------------------
        // 2: ERROR OVERLAY
        // -------------------------
        case 2: {
          it.print(0, 0, id(font_medium), "ERROR");
          it.image(0, y1, id(icon_error));

          it.printf(xc, y1, id(font_medium), TextAlign::CENTER, "%s", id(error_message).c_str());
          return;
        }

        case 0:
        default:
          break;  // kein Overlay → weiter unten normaler content_mode
      }

      // -------------------------------------------------------
      // 3. CONTENT ENGINE
      // -------------------------------------------------------
      switch (id(content_mode)) {

        // -----------------------------------------
        // -1: Bootscreen
        // -----------------------------------------
        case -1: {
          it.print(0, 0, id(font_medium), "BOOTING");
          it.image(42, 20, id(logo_esphome));
          it.printf(xc, y2, id(font_medium), TextAlign::CENTER,
                    "%s",
                    "${version}" );
          break;
        }

        // -------------------------
        // 0: IDLE
        // -------------------------
        case 0: {
          it.print(0, 0, id(font_medium), "INFO");
          int page_duration = id(page_info_duration).state * 1000;
          int active_subpage = (esphome::millis() / page_duration) % 6;

          static const char* wdays[]    = {"So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"};
          static const char* weekdays[] = {"Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"};

          auto t = id(esptime).now();
          float temp  = id(room_temp).state;
          float hum   = id(room_hum).state;
          float press = id(room_press).state;


          switch (active_subpage) {

            // -------------------------------------------------
            // 0.0: Uhrzeit
            // -------------------------------------------------
            case 0: {
              it.printf(xc, y0, id(font_huge), TextAlign::CENTER,
                        "%02d:%02d",
                        t.hour, t.minute);
              break;
            }

            // -------------------------------------------------
            // 0.1: Datum
            // -------------------------------------------------
            case 1: {
              it.printf(xc, y0, id(font_huge), TextAlign::CENTER,
                        "%02d.%02d.%02d",
                        t.day_of_month, t.month, t.year % 100);
              break;
            }

            // -------------------------------------------------
            // 0.2: Wochentag
            // -------------------------------------------------
            case 2: {
              it.printf(xc, y0, id(font_large), TextAlign::CENTER,
                        "%s",
                        weekdays[t.day_of_week]);
              break;
            }

            // -------------------------------------------------
            // 0.3: Temp / Press & Hum
            // -------------------------------------------------
            case 3: {
              it.printf(xc, y0, id(font_huge), TextAlign::CENTER, 
                        "%.1f°C",
                        temp);
              break;
            }

            // -------------------------------------------------
            // 0.4: Hum / Temp & Press
            // -------------------------------------------------
            case 4: {
              it.printf(xc, y0, id(font_huge), TextAlign::CENTER,
                        "%.0f%%rF",
                        hum);
              break;
            }

            // -------------------------------------------------
            // 0.5: Press / Temp & Hum
            // -------------------------------------------------
            case 5: {
              it.printf(xc, y0, id(font_huge), TextAlign::CENTER,
                        "%'.0fhPa",
                        press);
              break;
            }
            default:
              break;
          }
          break;
        }

        // -------------------------
        // 1: LISTENING
        // -------------------------
        case 1: {
          it.print(0, 0, id(font_medium), "LISTEN");
          it.printf(xc+16, y1, id(font_medium), TextAlign::CENTER, "%s", id(text_message).c_str());
          it.image(0, 32, id(icon_listening));          
          it.circle(110, 54, (millis() / 200) % 6 + 2);
          break;
        }

        // -------------------------
        // 2: THINKING
        // -------------------------
        case 2: {
          it.print(0, 0, id(font_medium), "THINKING");
          it.printf(xc+16, y1, id(font_medium), TextAlign::CENTER, "%s", id(text_message).c_str());
          it.image(0, 32, id(icon_thinking));          
          it.filled_circle(110, 54, (millis() / 200) % 6 + 2);
          break;
        }

        // -------------------------
        // 3: SPEAKING (TTS)
        // -------------------------
        case 3: {
          it.print(0, 0, id(font_medium), "SPEAKING");
          it.printf(xc+16, y1, id(font_medium), TextAlign::CENTER, "%s", id(text_message).c_str());
          it.image(0, 32, id(icon_speaking));          
          for (int i = 0; i < 5; i++) {
            int h = (sin((millis() / 150.0) + i) + 1) * 8;
            it.filled_rectangle(40 + i * 16, 60 - h, 10, h);
          }
          break;
        }

        // -------------------------
        // 4: MEDIA
        // -------------------------
        case 4: {
          it.print(0, 0, id(font_medium), "MEDIA");
          it.printf(xc+16, y1, id(font_medium), TextAlign::CENTER, "%s", id(text_message).c_str());
          it.image(0, 32, id(icon_speaking));
          break;
        }

        // -------------------------
        // 5: ANNOUNCING
        // -------------------------
        case 5: {
          it.print(0, 0, id(font_medium), "ANNOUNCING");
          it.printf(xc+16, y1, id(font_medium), TextAlign::CENTER, "%s", id(text_message).c_str());
          it.image(0, 32, id(icon_speaking));
          break;
        }

        // -------------------------
        // 6: PLAYING
        // -------------------------
        case 6: {
          it.print(0, 0, id(font_medium), "PLAYING");
          it.printf(xc+16, y1, id(font_medium), TextAlign::CENTER, "%s", id(text_message).c_str());
          it.image(0, 32, id(icon_speaking));
          break;
        }

        // -------------------------
        // 7: PAUSING
        // -------------------------
        case 7: {
          it.print(0, 0, id(font_medium), "PAUSING");
          it.printf(xc+16, y1, id(font_medium), TextAlign::CENTER, "%s", id(text_message).c_str());
          it.image(0, 32, id(icon_speaking));
          break;
        }

        // -------------------------
        // -: UNKNOWN
        // -------------------------
        default: {
          it.print(0, 0, id(font_medium), "UNKNOWN");
          it.printf(xc+16, y1, id(font_medium), TextAlign::CENTER, "%s", id(text_message).c_str());
          it.image(0, 32, id(icon_speaking));
          break;
        }
      }

#################################################################################
# Magic
#################################################################################

media_player:
  - platform: speaker
    id: hw_media_player
    name: "Audio Player"

    media_pipeline:
      speaker: media_source_speaker
      sample_rate: 48000
      num_channels: 2

    announcement_pipeline:
      speaker: announcement_source_speaker
      sample_rate: 16000
      num_channels: 1

    buffer_size: 1000000
    task_stack_in_psram: True
    volume_increment: 5%
    volume_initial: 50%
    volume_min: 0%
    volume_max: 100%

    on_announcement: 
      - logger.log: "media_player on_announcement"
      # VA antwortet → Announcing (5)
      - script.execute:
          id: set_content_mode
          mode: 5 # MP Announcing

    on_play: 
      - logger.log: "media_player on_play"
      # MP spielt Media → Playing (6)
      - script.execute:
          id: set_content_mode
          mode: 6 # MP Playing

    on_pause: 
      - logger.log: "media_player on_pause"
      # MP pausiert Media → Playing (7)
      - script.execute:
          id: set_content_mode
          mode: 7 # MP Plausing

    on_idle: 
      - logger.log: "media_player on_idle"
      # MP hat keine Media → Ideling (4)
      - script.execute:
          id: set_content_mode
          mode: 0 # MP Ideling

    on_turn_off: 
      - logger.log: "media_player on_turn_off"
      # MP aus → Idle (0)
      - script.execute:
          id: set_content_mode
          mode: 0 # idle

    on_turn_on: 
      - logger.log: "media_player on_turn_on"
      # MP an → Ideling (4)
      - script.execute:
          id: set_content_mode
          mode: 0 # Idle

    on_mute: 
      - logger.log: "media_player on_mute"
      - script.execute:
          id: show_volume_overlay
    on_unmute: 
      - logger.log: "media_player on_unmute"
      - script.execute:
          id: show_volume_overlay
    on_volume:
      - if:
          condition:
            lambda: 'return id(content_mode) != -1;'
          then:
            - logger.log: "media_player on_volume"
            - script.execute: show_volume_overlay

    on_state: 
      - logger.log:
          format: "media_player on_state: %s"
          args: [ 'media_player::media_player_state_to_string(id(hw_media_player).state)' ]

voice_assistant:
  id: va
  micro_wake_word:
  use_wake_word: False
  # microphone: hw_microphone
  microphone:
    - microphone: hw_microphone
      channels: 0
    - microphone: hw_microphone
      channels: 1
  # speaker: hw_speaker
  media_player: hw_media_player

  auto_gain: 31dBFS
  noise_suppression_level: 2
  volume_multiplier: 4.0

  on_client_connected:
    - logger.log: "voice_assistant on_client_connect"
    - micro_wake_word.start:

  on_client_disconnected:
    - logger.log: "voice_assistant on_client_disconnect"
    - micro_wake_word.stop:

  on_wake_word_detected: # kommt nur, wenn use_waker_word: true ist
    - logger.log: "voice_assistant on_wake_word_detected"

  on_listening:
    - logger.log: "voice_assistant on_Listening"
    # VA hört zu → Listening (1)
    - script.execute:
        id: set_content_mode
        mode: 1 # VA Listening

  on_start:
    - logger.log: "voice_assistant on_start"

  ######################################## stt ################################
  # Ende der Sprachantwort
  on_stt_end:
    - lambda:
        id(text_message) = "Q:"+x;
    - logger.log:
        format: "voice_assistant on_stt_end: %s"
        args: [id(text_message).c_str()]
    # Spracheingabe beendet → Thinking (2)
    - script.execute:
        id: set_content_mode
        mode: 2 # VA Thinking

  on_stt_vad_start:
    - logger.log: "voice_assistant on_vad_start"
  on_stt_vad_end:
    - logger.log: "voice_assistant on_stt_vad_end"

  ######################################### tts ################################
  on_tts_start:
    - lambda:
        id(text_message) = "A:"+x;
    - logger.log:
        format: "voice_assistant on_tts_start: %s"
        args: [id(text_message).c_str()]
    # TTS spricht → Speaking (3)
    - script.execute:
        id: set_content_mode
        mode: 3 # VA Speaking

  # on_tts_stream_start:
  #   - logger.log: "voice_assistant on_tts_stream_start"
  #   # TTS spricht → Speaking (3)
  #   - script.execute:
  #       id: set_content_mode
  #       mode: 3

  # on_tts_stream_end:
  #   - logger.log: "voice_assistant on_tts_stream_end"
  #   # TTS fertig → zurück zu Idle (0)
  #   - script.execute:
  #       id: set_content_mode
  #       mode: 0
  #   # Restart only mWW if enabled; streaming wake words automatically restart
  #   - micro_wake_word.start:

  on_tts_end:
    - lambda:
        id(text_message) = "URL:"+x;
    - logger.log:
        format: "voice_assistant on_tts_end: %s"
        args: [id(text_message).c_str()]
    - script.execute:
        id: set_content_mode
        mode: 0 # idle

  on_idle:
    - logger.log: "voice_assistant on_idle"
    # # nix zu tun → zurück zu Idle (0)
    # - script.execute:
    #     id: set_content_mode
    #     mode: 0

  on_end:
    - logger.log: "voice_assistant on_end"
    - micro_wake_word.start: 

  on_error:
    - logger.log:
        format: "voice_assistant on_error %d %s"
        args: [code, message.c_str()]
    # Fehler → erst zurück zu Idle (0), dann zu Error(5), der geht dann zurück auf idle(0)
    - script.execute:
        id: set_content_mode
        mode: 0
    - script.execute:
        id: show_error_overlay
        msg: !lambda |
          return code + ": " + message;
    - micro_wake_word.start: 

  on_intent_start:
    - logger.log: "voice_assistant on_intent_start"
  on_intent_progress:
    - logger.log:
        format: "voice_assistant on_intent_progress %s"
        args: [x.c_str()]
  on_intent_end:
    - logger.log: "voice_assistant on_intent_end"

  on_timer_started:
    - logger.log: "voice_assistant on_timer_started"
  on_timer_finished:
    - logger.log: "voice_assistant on_timer_finished"
  on_timer_cancelled:
    - logger.log: "voice_assistant on_timer_cancelled"
  on_timer_tick:
    - logger.log: "voice_assistant on_timer_tick"
  on_timer_updated:
    - logger.log: "voice_assistant on_timer_updated"

micro_wake_word:
  stop_after_detection: true
  on_wake_word_detected:
    - logger.log: "micro_wake_word on_wake_word_detected"
    - voice_assistant.start:
        wake_word: !lambda return wake_word;
  vad:
  models:
    - model: okay_nabu
      id: okay_nabu

#################################################################################
# Functions
#################################################################################

# content_mode
#-1 = Boot
# 0 = Idle
# 1 = VA Listening
# 2 = VA Thinking
# 3 = VA Speaking
# 4 = Player
# 5 = MP Announcing
# 6 = MP Playing
# 7 = MP Pausing

# overlay_mode
# 0 = kein Overlay
# 1 = Volume Overlay
# 2 = Error Overlay

# globals - Application Variablen
globals:
  - id: content_mode
    type: int
    restore_value: False
    initial_value: "-1" # Boot
  - id: overlay_mode
    type: int
    restore_value: False
    initial_value: "0" # kein overlay

  - id: error_message
    type: std::string
    initial_value: "\"\""
  - id: text_message
    type: std::string
    initial_value: ""

# configuration - Bedienelemente im HA - Gerät
button:
  - platform: restart
    id: restart_button
    name: "Restart Device"
  - platform: template
    name: "Stop"
    id: btn_media_stop
    on_press: 
      - media_player.stop: hw_media_player
      - script.execute:
          id: set_content_mode
          mode:  0
number:
  - platform: template
    id: volume_number
    name: "Speaker Vol"
    min_value: 0
    max_value: 100
    step: 5
    optimistic: true
    restore_value: True
    set_action:
      - lambda: |-
          id(hw_speaker)->set_volume(float(x) / 100.0f);
          id(show_volume_overlay).execute();
  - platform: template
    id: page_info_duration
    name: "Info Speed"
    entity_category: config
    min_value: 15
    max_value: 300
    step: 15
    initial_value: 60
    optimistic: true
    restore_value: True
  - platform: template
    id: content_mode_number
    name: "Content Mode"
    entity_category: diagnostic
    min_value: -1
    max_value: 8
    step: 1
    optimistic: true
    set_action:
      - lambda: |-
          id(set_content_mode).execute(int(x));
  - platform: template
    id: overlay_mode_number
    name: "Overlay Mode"
    entity_category: diagnostic
    min_value: 0
    max_value: 2
    step: 1
    optimistic: true
    set_action:
      - lambda: |-
          id(overlay_mode) = int(x);
          id(display_id).update();

# Zentrale Stelle für Systemreaktionen
script:
  - id: set_content_mode
    parameters:
      mode: int # neuer content mode
    then:
      - logger.log:
          format: "script set_content_mode %d"
          args: [mode]
      - lambda: |-
          // Mode setzen
          id(content_mode) = mode;
          // mit HA synchronisieren
          id(content_mode_number).publish_state(mode);

          // LED-Effekt auswählen (neue Namen)
          std::string effect = "Effect Content " + std::to_string(mode);
          // auto call = id(hw_leds).turn_on();
          // call.set_effect(effect.c_str());
          // call.perform();

          id(hw_leds).turn_on().set_effect(effect).perform();

          // Display aktualisieren
          id(display_id).update();
  - id: show_volume_overlay
    mode: restart
    then:
      - logger.log:
          format: "script show_volume_overlay"
      - lambda: |-
          id(overlay_mode) = 1;   // Volume Overlay
          id(display_id).update();

      - delay: 5s

      - lambda: |-
          id(overlay_mode) = 0;
          id(display_id).update();

  - id: show_error_overlay
    mode: restart
    parameters:
      msg: string
    then:
      - logger.log:
          format: "script show_error_overlay %s"
          args: [msg.c_str()]
      - lambda: |-
          id(error_message) = msg;
          id(overlay_mode) = 2;   // Error Overlay
          id(display_id).update();

      - delay: 5s

      - lambda: |-
          id(overlay_mode) = 0;
          id(display_id).update();

