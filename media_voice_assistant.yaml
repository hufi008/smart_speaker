    glyphs: ["äöüÄÖÜß°"]
    glyphsets:
      - GF_Latin_Kernel

# Display ssd1306
display:
  - platform: ssd1306_i2c
    id: display_id
    model: "SSD1306 128x64"
    update_interval: 200ms
    lambda: |-
      // -------------------------------------------------------
      // 1a. GELBER HEADER-BEREICH (Pixel 0–15)
      // -------------------------------------------------------
      {
        // Icons rechts (jeweils 16x16)
        // WiFi Signalstärke
        if (id(wifi_id).is_connected()) {
            //it.image(112, 0, id(icon_wifi));
            float strength = id(wifi_rssi).state;

            if (strength > -55)
                it.image(112, 0, id(icon_wifi_4));
            else if (strength > -65)
                it.image(112, 0, id(icon_wifi_3));
            else if (strength > -75)
                it.image(112, 0, id(icon_wifi_2));
            else
                it.image(112, 0, id(icon_wifi_1));
        }

        if (id(api_id).is_connected()) {
          if (id(va).get_api_connection() != nullptr)
            it.image(96, 0, id(icon_va));
          else
            it.image(96, 0, id(icon_api));
        }

        if (id(hw_media_player).state == media_player::MEDIA_PLAYER_STATE_IDLE)
          it.image(80, 0, id(icon_mp_idle));
        else if (id(hw_media_player).state == media_player::MEDIA_PLAYER_STATE_PLAYING)
          it.image(80, 0, id(icon_mp_play));
        else if (id(hw_media_player).state == media_player::MEDIA_PLAYER_STATE_PAUSED)
          it.image(80, 0, id(icon_mp_pause));
        else if (id(hw_media_player).state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING)
          it.image(80, 0, id(icon_mp_announce));

        if (id(hw_media_player).is_muted())
          it.image(64, 0, id(icon_mute));
        if (id(hw_microphone)->get_mute_state())
        it.image(48, 0, id(icon_deaf));
      }

      // -------------------------------------------------------
      // 1b. BLAUER CONTENT-BEREICH (Pixel 16–63)
      // -------------------------------------------------------
      // Trennlinie zwischen GELB (oben) und BLAU (unten)
      it.line(0,15,127,15);
      //it.rectangle(0, 16, 128, 48);

      // Positionen
      constexpr int xc = 64; // Mitte
      constexpr int xi = 1;  // für Icon (32x32)
      constexpr int x0 = 64+18; // Mitte mit Icon
      constexpr int yc = 40; // für HUGE
      constexpr int yi = 21; // für Icon (32x32)
      constexpr int y1 = 28; // Subtext in medium oben
      constexpr int y2 = 52; // Subtext in medium unten

      // -------------------------------------------------------
      // 2. OVERLAY ENGINE
      // -------------------------------------------------------
      if (id(overlay_mode) != 0) {
        // Titel links
        it.print(0, 0, id(font_medium), overlay_mode_to_string(id(overlay_mode)));

        // Overlays haben Vorrang
        switch (id(overlay_mode)) {

          // -------------------------
          // 1: VOLUME OVERLAY
          // -------------------------
          case 1: {
            it.image(xi, yi, id(icon_volume));

            if (id(hw_media_player).is_muted()) {
              it.print(x0, yc, id(font_large), TextAlign::CENTER, "MUTE");
            } else {
              float vol = id(hw_media_player).volume;          
              it.printf(x0, yc, id(font_large), TextAlign::CENTER, "%.0f%%", vol * 100.0f);
              it.filled_rectangle(40, 50, vol * 80, 14);
            }
            return;
          }

          // -------------------------
          // 2: ERROR OVERLAY
          // -------------------------
          case 2: {
            it.image(xi, yi, id(icon_error));

            // Text umbrechen (max 18 Zeichen pro Zeile)
            auto lines = wrap_text(id(error_message), 18);

            // Font-Höhe dynamisch abfragen
            int line_height = id(font_medium).get_height();

            // Vertikal zentrieren
            int total_height = lines.size() * line_height;
            int y = yc - total_height / 2;

            // Rendern
            for (auto &line : lines) {
                it.printf(x0, y, id(font_medium), TextAlign::CENTER, "%s", line.c_str());
                y += line_height;
            }
            return;
          }

          // -------------------------
          // 3: ANNOUNCE
          // -------------------------
          case OVERLAY_ANNOUNCE: {
            it.image(xi, yi, id(icon_announce));

            auto lines = wrap_text(id(announce_message), 14);  // max 14 Zeichen pro Zeile

            int line_height = id(font_medium).get_height();
            int total_height = lines.size() * line_height;
            int y = yc - total_height / 2;

            for (auto &line : lines) {
                it.printf(x0, y, id(font_medium), TextAlign::CENTER, "%s", line.c_str());
                y += line_height;
            }            

            //it.printf(x0, yc, id(font_medium), TextAlign::CENTER, "%s", id(announce_message).c_str());
            
            return;
          }

          //case 0:
          default:
            break;  // kein Overlay → weiter unten normaler content_mode
        }
      }

      // -------------------------------------------------------
      // 3. CONTENT ENGINE
      // -------------------------------------------------------
      // Titel links
      it.print(0, 0, id(font_medium), content_mode_to_string(id(content_mode)));
      switch (id(content_mode)) {

        // -----------------------------------------
        // 0: Bootscreen
        // -----------------------------------------
        case CONTENT_BOOT: {
          #include <esp_idf_version.h>
          it.image(1, 17, id(logo_esphome));
          it.printf(xc, y1, id(font_medium), TextAlign::CENTER,
                    "%s",
                    "${version}");
          it.printf(xc, y2, id(font_medium), TextAlign::CENTER,
                    "%s",
                    IDF_VER);
          break;
        }

        // -------------------------
        // 1: IDLE
        // -------------------------
        case CONTENT_IDLE: {
          it.print(xc, yc, id(font_huge), TextAlign::CENTER, id(idle_message).c_str());
          break;
        }

        // -------------------------
        // 2: LISTEN
        // -------------------------
        case CONTENT_LISTEN: {
          it.print(x0, y1, id(font_medium), TextAlign::CENTER, "Ja bitte");
          it.image(xi, yi, id(icon_listen));          
          it.circle(110, 54, (millis() / 200) % 6 + 2);
          break;
        }

        // -------------------------
        // 3: THINK
        // -------------------------
        case CONTENT_THINK: {
          it.image(xi, yi, id(icon_think));
          
          // Text umbrechen (max 18 Zeichen pro Zeile)
          auto lines = wrap_text(id(command_message), 14);

          // Font-Höhe dynamisch abfragen
          int line_height = id(font_medium).get_height();

          // Vertikal zentrieren
          int total_height = lines.size() * line_height;
          int y = yc - total_height / 2;

          // Rendern
          for (auto &line : lines) {
              it.printf(x0, y, id(font_medium), TextAlign::CENTER, "%s", line.c_str());
              y += line_height;
          }

          // Denk-Animation (dein Kreis)
          it.filled_circle(110, 54, (millis() / 200) % 6 + 2);
          
          break;
        }

        // -------------------------
        // 4: PLAY
        // -------------------------
        case CONTENT_PLAY: {
          const int display_width = 128;
          const int speed = 40;      // Scrollgeschwindigkeit
          const int gap = 40;        // Abstand bevor der Text wieder erscheint

          // Titel
          {
              std::string title = id(media_title).state;

              // Scroll-Offset
              int scroll = (millis() / speed) % (display_width + gap);

              // Wenn der Text kurz ist → zentrieren
              if (title.length() < 18) {
                  it.printf(xc, y1, id(font_medium), TextAlign::CENTER, "%s", title.c_str());
              } else {
                  // langer Text → scrollen
                  it.printf(x0 - scroll, y1, id(font_medium), TextAlign::LEFT, "%s", title.c_str());
              }
          }

          // Artist
          {
              std::string artist = id(media_artist).state;

              int scroll = (millis() / speed) % (display_width + gap);

              if (artist.length() < 18) {
                  it.printf(xc, y2, id(font_medium), TextAlign::CENTER, "%s", artist.c_str());
              } else {
                  it.printf(x0 - scroll, y2, id(font_medium), TextAlign::LEFT, "%s", artist.c_str());
              }
          }

          break;
        }

        // -------------------------
        // 5: PAUSE
        // -------------------------
        case CONTENT_PAUSE: {
          it.image(xi, yi, id(icon_pause));
          break;
        }

        // -------------------------
        // 6: ALARM
        // -------------------------
        case CONTENT_ALARM: {
          it.image(xi, yi, id(icon_alarm));
          break;
        }

        // -------------------------
        // -: UNKNOWN
        // -------------------------
        default: {
          it.image(xi, yi, id(icon_unknown));
          break;
        }
      }

media_source:
  - platform: audio_http
    id: media_file_source                 # media-pipeline spielt nur hhtp ab
  - platform: audio_file
    id: announcement_local_file_source    # für lokale sounds in der announce-pipeline
  - platform: audio_http
    id: announcement_file_source          # für TTS in der announce-pipeline

#################################################################################
# Magic
#################################################################################

media_player:
  - platform: speaker_source
    id: hw_media_player
    name: "Audio Player"

    media_pipeline:
      speaker: media_source_speaker
      sample_rate: 48000
      num_channels: 2      
      sources:
        - media_file_source


    announcement_pipeline:
      speaker: announcement_source_speaker
      sample_rate: 16000
      num_channels: 1
      sources:
        - announcement_local_file_source
        - announcement_file_source

    volume_increment: 5%
    volume_initial: 50%
    volume_min: 0%
    volume_max: 100%

    on_announcement:
      - if:
          condition:
            lambda: 'return id(content_mode) > CONTENT_BOOT;'
          then:
            - logger.log: "Ducking enabled"
            - mixer_speaker.apply_ducking:
                id: media_mixing_input
                decibel_reduction: 20
                duration: 0.3s
            - script.execute: on_media_player_announcement

    on_play:
      - if:
          condition:
            lambda: 'return id(content_mode) > CONTENT_BOOT;'
          then:
            - logger.log: "Ducking enabled"
            - mixer_speaker.apply_ducking:
                id: media_mixing_input
                decibel_reduction: 0
                duration: 0.3s
            - script.execute: on_media_player_play
    on_pause:
      - script.execute: on_media_player_pause
    on_idle:
      - if:
          condition:
            lambda: 'return id(content_mode) > CONTENT_BOOT;'
          then:
            - script.execute: on_media_player_idle
    on_turn_on:
      - script.execute: on_media_player_turn_on
    on_turn_off:
      - script.execute: on_media_player_turn_off
    on_mute:
      - script.execute: on_media_player_mute
    on_unmute:
      - script.execute: on_media_player_unmute
    on_volume:
      - if:
          condition:
            lambda: 'return id(content_mode) > CONTENT_BOOT;'
          then:
            - script.execute: on_media_player_volume
    on_state:
      - script.execute: on_media_player_state

