#################################################################################
# Functions
#################################################################################

# content_mode
# 0 = Boot
# 1 = Idle
# 2 = VA Listening
# 3 = VA Thinking
# 4 = MP Announcing
# 5 = MP Playing
# 6 = MP Pausing
# 7 = Alarm

# overlay_mode
# 0 = kein Overlay
# 1 = Volume Overlay
# 2 = Error Overlay

# interval für idle page
interval:
  - interval: 15s
    id: idle_page_interval
    then:
      - lambda: |-
          int page_duration = id(page_info_duration).state * 1000;
          int idx = (esphome::millis() / page_duration) % 6;

          char buffer[192];

          // Deutsche Wochentage
          static const char* weekdays[] = {
            "Sonntag", "Montag", "Dienstag", "Mittwoch",
            "Donnerstag", "Freitag", "Samstag"
          };

          auto now = id(esptime).now();

          switch (idx) {

            case 0:  // Uhrzeit
              snprintf(buffer, sizeof(buffer), "%02d:%02d",
                       now.hour, now.minute);
              break;

            case 1:  // Datum
              snprintf(buffer, sizeof(buffer), "%02d.%02d.%02d",
                       now.day_of_month, now.month, now.year % 100);
              break;

            case 2:  // Wochentag
              snprintf(buffer, sizeof(buffer), "%s",
                       weekdays[now.day_of_week-1]);
              break;

            case 3:  // Temperatur
              snprintf(buffer, sizeof(buffer), "%.1f °C",
                       id(room_temp).state);
              break;

            case 4:  // Luftfeuchtigkeit
              snprintf(buffer, sizeof(buffer), "%.0f%% rF",
                       id(room_hum).state);
              break;

            case 5:  // Luftdruck
              snprintf(buffer, sizeof(buffer), "%.0f hPa",
                       id(room_press).state);
              break;
          }

          id(idle_message) = buffer;


