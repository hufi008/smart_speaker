######################### Configuration

substitutions:
  name: "esphome-web-15bb2c"
  friendly_name: "Smart Speaker 4"
  version: "0.5.0"
  media_player_entity_id: "media_player.${ friendly_name | lower | replace(' ', '_') }_audio_player"

  ### Pin-Belegung
  # Amp Max98357
  amp_lrclk_pin:  "GPIO11"   # LEFT / RIGHT CLOCK
  amp_bclk_pin:   "GPIO10"   # Bit CLOCK
  amp_din_pin:    "GPIO09"   # DATA IN
  # VCC: 5V
  # GAIN: 100kΩ GND = 15dB, GND = 12dB, nix = 9dB, VCC = 6dB, 100kΩ VCC = 3DB
  # SD: nix = (L+R)/2, 370kΩ VCC = Rechts, 100kΩ = Links
  

  # Microphone INMP441
  mic_ws_pin:    "GPIO04"   # WORD SELECT
  mic_sck_pin:   "GPIO05"   # SERIAL CLOCK
  mic_sd_pin:    "GPIO06"   # SERIAL DATA
  # VCC: 3V3
  # L/R: GND = Links, VCC = Rechts

  # LED Strip WS2812
  led_din_pin:   "GPIO08"    # DATA IN
  led_count:     "10"        # Number of LEDs
  # VCC: 5V
  # din mit Levelshifter auf 5V heben

  # I2C
  i2c_sda_pin:   "GPIO01"    # SERIAL DATA
  i2c_scl_pin:   "GPIO02"    # SERIAL CLOCK
  # VCC: 3V3
  
  # Environment BME280
  bme_addr:      "0x76"
  # VCC: 3V3 bis 5V

  # Display OLED SSD1306
  ssd_addr:      "0x3C"
  # VCC: 3V3 bis 5V

  # Button TTP221
  btn_1_pin:     "GPIO15"
  btn_2_pin:     "GPIO16"
  btn_3_pin:     "GPIO17"
  btn_4_pin:     "GPIO18"
  # VCC: 2V bis 5V5

  # Display Modes
  CONTENT_BOOT:     0
  CONTENT_IDLE:     1
  CONTENT_PLAY:     2
  CONTENT_PAUSE:    3
  CONTENT_LISTEN:   4
  CONTENT_THINK:    5

  OVERLAY_NONE:     0
  OVERLAY_VOLUME:   1
  OVERLAY_ERROR:    2
  OVERLAY_ALARM:    3
  OVERLAY_ANNOUNCE: 4

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.6.4
  name_add_mac_suffix: false
  project:
    name: "hufi.smart_speaker"
    version: ${version}
  on_boot:
    - priority: 600
      then:
        - script.execute: on_esp_boot_600
    - priority: 250
      then:
        - script.execute: on_esp_boot_250
    - priority: 200
      then:
        - script.execute: on_esp_boot_200
    - priority: -100
      then:
        - script.execute: on_esp_boot_minus100
            
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  cpu_frequency: 240MHZ
  flash_mode: dio  
  framework:
    type: esp-idf
    
# Enable Home Assistant API
api:
  id: api_id
  encryption:
    key: !secret api_encryption_key
  on_client_connected:
    - script.execute: on_api_client_connect
  on_client_disconnected:
    - script.execute: on_api_client_disconnect

# Allow Over-The-Air updates
ota:
- platform: esphome
  allow_partition_access: true
  password: !secret ota_password

wifi:
  id: wifi_id
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - script.execute: on_wifi_connect
  on_disconnect:
    - script.execute: on_wifi_disconnect
# Enable logging
logger:
  level: DEBUG

# SSL-Zertifikatsprüfung für Streams abschalten (schont Heap-Memory & CPU)
http_request:
  verify_ssl: false

# High-Performance Netzwerk-Puffer drosseln (verhindert Buffer-Overflows im File-Reader)
network:
  enable_high_performance: false

globals:
  - id: is_booting
    type: bool
    initial_value: "true"
  - id: skip_next_announcement
    type: bool
    initial_value: "false"

  - id: content_mode
    type: int
    initial_value: "0"    
  - id: overlay_mode
    type: int
    initial_value: "0"
  - id: content_mode_text
    type: std::vector<std::string>
    initial_value: '{"BOOT", "IDLE", "PLAY", "PAUSE", "LISTEN", "THINK", "ANNOUNCE"}'  
  - id: overlay_mode_text
    type: std::vector<std::string>
    initial_value: '{"NONE", "VOLUME", "ERROR", "ALARM", "ANNOUNCE"}'  

  - id: status_symbols
    type: 'image::Image*[4]'
    initial_value: '{nullptr, nullptr, nullptr, nullptr}'
  - id: title_text
    type: std::string
    initial_value: "\"title\""

  - id: image_icon
    type: 'image::Image*'
    initial_value: '&id(icon_think)'
  - id: idle_message0
    type: std::string
    initial_value: "\"00:00\""
  - id: idle_message1
    type: std::string
    initial_value: "\"Hallo\""
  - id: idle_message2
    type: std::string
    initial_value: "\"Welt\""
  - id: idle_message3
    type: std::string
    initial_value: "\"Again\""

  - id: command_message
    type: std::string
    initial_value: "\"command\""
  - id: intent_message
    type: std::string
    initial_value: "\"intent\""
  - id: announce_message
    type: std::string
    initial_value: "\"announce\""
  - id: url_message
    type: std::string
    initial_value: "\"url\""
  - id: alarm_message
    type: std::string
    initial_value: "\"alarm\""
  - id: error_code
    type: std::string
    initial_value: "\"code\""
  - id: error_message
    type: std::string
    initial_value: "\"error\""

########################## Components
psram:
  mode: octal
  speed: 80MHz

time:
  - platform: homeassistant
    id: esptime
    on_time_sync: 
      then:
        - script.execute: on_time_time_sync

deep_sleep:
  id: deep_sleep_id
  wakeup_pin: 
    number: GPIO15
    allow_other_uses: true
  wakeup_pin_mode: INVERT_WAKEUP
  #esp32_ext1_wakeup :
  #  pins: 
  #    - GPIO15
  #    - GPIO16
  #    - GPIO17
  #    - GPIO18
  #  mode: ANY_LOW
  
button:
  - platform: restart
    name: "Restart"
  - platform: template
    name: "Shutdown"
    on_press:
      then:
        # Display ausschalten
        - lambda: 'id(display_id).turn_off();'            
        - light.turn_off: ledstrip_id
        - wait_until:
              light.is_off: ledstrip_id
        - delay: 100ms
        - deep_sleep.enter: deep_sleep_id

binary_sensor:
  - platform: gpio
    id: btn_up_id
    pin:
      number: GPIO15
      allow_other_uses: true
    on_multi_click:
     # --- EINFACHKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - script.execute: "on_btn_1_single_click"

      # --- DOPPELKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - script.execute: "on_btn_1_double_click"

      # --- LANGER KLICK ---
      - timing:
          - ON for at least 1.0s
        then:
          - script.execute: "on_btn_1_long_click"    
  - platform: gpio
    id: btn_down_id
    pin:
      number: GPIO16
      allow_other_uses: false
    
    on_multi_click:
     # --- EINFACHKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - script.execute: "on_btn_2_single_click"

      # --- DOPPELKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - script.execute: "on_btn_2_double_click"

      # --- LANGER KLICK ---
      - timing:
          - ON for at least 1.0s
        then:
          - script.execute: "on_btn_2_long_click"    
  - platform: gpio
    id: btn_left_id
    pin:
      number: GPIO17
      allow_other_uses: false
    on_multi_click:
     # --- EINFACHKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - script.execute: "on_btn_3_single_click"

      # --- DOPPELKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - script.execute: "on_btn_3_double_click"

      # --- LANGER KLICK ---
      - timing:
          - ON for at least 1.0s
        then:
          - script.execute: "on_btn_3_long_click"    
  - platform: gpio
    id: btn_right_id
    pin:
      number: GPIO18
      allow_other_uses: false
    on_multi_click:
     # --- EINFACHKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - script.execute: "on_btn_4_single_click"

      # --- DOPPELKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - script.execute: "on_btn_4_double_click"

      # --- LANGER KLICK ---
      - timing:
          - ON for at least 1.0s
        then:
          - script.execute: "on_btn_4_long_click"    

light:
  - platform: esp32_rmt_led_strip
    id: ledstrip_id
    name: LED Status
    pin: GPIO8
    chipset: WS2812
    num_leds: 10
    rgb_order: GRB
    restore_mode: RESTORE_AND_ON
    icon: "mdi:led-strip"
    max_refresh_rate: 30ms
    use_dma: true
    rmt_symbols: 48
    use_psram: true
    effects:
      - addressable_scan:
          name: Scan slow
          move_interval: 0.2s
          scan_width: 3
      - addressable_rainbow:
          speed: 8
          width: 12
          name: Rainbow
      - addressable_twinkle:
          name: Twinkle
          progress_interval: 4ms
          twinkle_probability: 5%
      - addressable_color_wipe:
          name: Color Wipe
          add_led_interval: 0.1s
      # Content Mode Effects
      # Effect CONTENT_BOOT
      - addressable_lambda:
          name: "Effect CONTENT_0" # BOOT
          update_interval: 50ms
          lambda: |-
            int value = 16 + (millis() / 40);
            if (value > 255) value = 255;

            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(0, 0, value);
            }
      # Effect CONTENT_IDLE
      - addressable_lambda:
          name: "Effect CONTENT_1" # IDLE
          update_interval: 30ms
          lambda: |-
            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(0, 0, 0);
            }
      # Effect CONTENT_PLAY
      - addressable_rainbow:
          name: "Effect CONTENT_2" # PLAY
          speed: 16
          width: 12
          
      # Effect CONTENT_PAUSE
      - addressable_lambda:
          name: "Effect CONTENT_3" # PAUSE
          update_interval: 50ms
          lambda: |-
            float t = (sin(millis() / 500.0f) + 1) / 2;  // langsames Atmen
            uint8_t y = 60 + (uint8_t)(t * 120);

            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(y, y, 0);  // Gelb
            }
      # Effect CONTENT_LISTEN
      - addressable_lambda:
          name: "Effect CONTENT_4"  # LISTEN
          update_interval: 20ms
          lambda: |-
            const int count = it.size();
            const float t = millis() / 250.0f;   // Puls-Geschwindigkeit
            const float pulse = (sin(t) + 1.0f) * 0.5f;  // 0..1
      
            const float center = (count - 1) / 2.0f;     // Mitte der LEDs
      
            for (int i = 0; i < count; i++) {
              float d = fabsf(i - center);               // Abstand zur Mitte
              float falloff = 1.0f - (d / center);       // 1.0 in der Mitte, 0.0 außen
              if (falloff < 0.0f) falloff = 0.0f;
      
              int brightness = int( falloff * pulse * 255 );
      
              // Farbe: Cyan-Blau wie dein Listening-Effekt
              it[i] = Color(0, 64, brightness);
            }
      # Effect CONTENT_THINK
      - addressable_lambda:
          name: "Effect CONTENT_5" # THINK
          update_interval: 20ms
          lambda: |-
            int pos = (millis() / 40) % it.size();
            pos = it.size() - pos;
            for (int i = 0; i < it.size(); i++) {
              int d = abs(i - pos);
              int b = max(0, 150 - d * 40);
              it[i] = Color(b, 0, b);
            }

      # Overlay Mode Effects
      # Effect OVERLAY_NONE
      - addressable_lambda:
          name: "Effect OVERLAY_0"
          update_interval: 250ms
          lambda: |-
            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(0,0,0);
            }
      # Effect OVERLAY_VOLUME
      - addressable_lambda:
          name: "Effect OVERLAY_1"
          update_interval: 20ms
          lambda: |-
            if (id(media_player_id).is_muted()) {
              float t = (millis() % 800) / 800.0f;
              float fade = (sin(t * 2 * 3.14159f) + 1) / 2;  // 0–1
              for (int i = 0; i < it.size(); i++) {
                it[i] = Color(0, 0, int(128 * fade));
              }
              return;
            }

            float index = id(media_player_id).volume * it.size();

            for (int i = 0; i < it.size(); i++) {
              float fade = std::clamp(index - i, 0.2f, 1.0f);
              // falschrum eingebaut
              it[i] = Color(0, int(127*fade), int(255*fade));
            }
      # Effect OVERLAY_ERROR
      - addressable_lambda:
          name: "Effect OVERLAY_2"
          update_interval: 40ms
          lambda: |-
            float t = (millis() % 800) / 800.0f;
            float b = (sin(t * 2 * 3.14159f) + 1) / 2;  // 0–1
            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(int(200 * b), 0, 0);
            }
      # Effect CONTENT_ALARM
      - addressable_lambda:
          name: "Effect OVERLAY_3"
          update_interval: 50ms
          lambda: |-
            float t = (sin(millis() / 250.0f) + 1) / 2;  // langsames Atmen
            uint8_t y = 60 + (uint8_t)(t * 120);

            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(y, 0, 0);  // Rot
            }
      # Effect OVERLAY_ANNOUNCE
      - addressable_lambda:
          name: "Effect OVERLAY_4"
          update_interval: 20ms
          lambda: |-
            const int count = it.size();

            // Position des Scans (läuft von 0 bis count-1)
            int pos = (millis() / 40) % count;

            for (int i = 0; i < count; i++) {
              // Abstand zur Scan-Position
              int d = abs(i - pos);

              // Helligkeit abhängig vom Abstand (weicher Abfall)
              int b = max(0, 120 - d * 40);  // 120 = hell, 40 = Abfall pro LED

              it[i] = Color(b+75, b, b+75);  // Cyan-Blau
            }
            
          
i2c:
  - id: i2c_bus
    sda: GPIO1
    scl: GPIO2
    scan: true
    frequency: 400kHz

sensor:
  # Wifi Informationen
  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi Signal dB"
    update_interval: 30s
  - platform: template
    id: wifi_channel
    name: "Channel"
    icon: "mdi:wifi-marker"
    entity_category: diagnostic
    lambda: |-
      if (id(wifi_id).is_connected())
        return id(wifi_id).get_wifi_channel();
      return -1;    
    update_interval: 30s      
  - platform: bme280_i2c
    id: envir_id
    address: 0x76
    temperature:
      id: room_temp
      name: Temperature
      device_class: temperature
      state_class: measurement      
    humidity:
      id: room_hum
      name: Humidity
      device_class: humidity
      state_class: measurement      
    pressure:
      id: room_press
      name: Pressure
      device_class: atmospheric_pressure
      state_class: measurement
      
text_sensor:
  # Wifi Informationen
  - platform: wifi_info
    id: wifi_info
    ip_address:
      name: "IP"
      icon: "mdi:wifi"
    ssid:
      name: "SSID"
      icon: "mdi:wifi"
    bssid:
      name: "BSSID"
      icon: "mdi:wifi"
    mac_address:
      name: "Mac"
      icon: "mdi:wifi"
    dns_address:
      name: "DNS"
      icon: "mdi:wifi"
    power_save_mode:
      name: "Power Save"
      icon: "mdi:wifi"
    # scan_results:
    #   name: "Scan"
    #   icon: "mdi:wifi"
  # Titel des aktuellen Tracks
  - platform: homeassistant
    id: media_title
    entity_id: ${media_player_entity_id}
    attribute: media_title
    on_value:
      then:
        - lambda: 'id(media_artist).state = "";'
        - logger.log:
            format: "media_title='%s'"
            args: [ id(media_title).state.c_str() ]
        - script.execute: update_data            
  # Interpret
  - platform: homeassistant
    id: media_artist
    entity_id: ${media_player_entity_id}
    attribute: media_artist
    on_value:
      then:
        - logger.log:
            format: "media_artist='%s'"
            args: [ id(media_artist).state.c_str() ]
        - script.execute: update_data
  # Channel
  - platform: homeassistant
    id: media_channel
    entity_id: ${media_player_entity_id}
    attribute: media_channel
    on_value:
      then:
        - logger.log:
            format: "media_channel='%s'"
            args: [ id(media_channel).state.c_str() ]
        - script.execute: update_data
  # Channel
  - platform: homeassistant
    id: media_album_name
    entity_id: ${media_player_entity_id}
    attribute: media_album_name
    on_value:
      then:
        - logger.log:
            format: "media_album_name='%s'"
            args: [ id(media_album_name).state.c_str() ]
        - script.execute: update_data

