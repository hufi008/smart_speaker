# interval für idle page
interval:
  - id: update_interval
    interval: 15s
    then:
      - script.execute: update_data


# I2S Audio Bus
i2s_audio:
  # Eingang (Stereo INMP441)
  - id: i2s_bus_in
    i2s_lrclk_pin: GPIO4      # WS
    i2s_bclk_pin: GPIO5       # sck

  # Ausgang (Stereo MAX98357)
  - id: i2s_bus_out
    i2s_lrclk_pin: GPIO11
    i2s_bclk_pin: GPIO10
   
# Microphone INMP441
microphone:
  - platform: i2s_audio
    id: hw_microphone
    i2s_audio_id: i2s_bus_in
    adc_type: external
    i2s_din_pin: GPIO6        # sd
    pdm: false
    bits_per_sample: 32bit
    sample_rate: 16000
    mclk_multiple: 256
    channel: stereo
    num_channels: 2
    i2s_mode: primary

# Amplifier MAX 98357
speaker:
  # A) Der physische I2S Hardware-Lautsprecher (Ausgang)
  - platform: i2s_audio
    id: hw_speaker
    i2s_audio_id: i2s_bus_out
    dac_type: external
    i2s_dout_pin: GPIO9
    bits_per_sample: 32bit
    sample_rate: 48000
    mclk_multiple: 256
    channel: stereo
    num_channels: 2
    buffer_duration: 500ms
    i2s_mode: primary

  # B) Der digitale Audio-Mixer
  - platform: mixer
    id: audio_mixer
    output_speaker: hw_speaker
    num_channels: 2
    source_speakers:
      - id: media_mixing_input
        timeout: never
      - id: announcement_mixing_input
        timeout: never

  # C) Virtueller Resampler für Musik-Medien
  - platform: resampler
    id: media_source_speaker
    output_speaker: media_mixing_input

  # D) Virtueller Resampler für Durchsagen (Announcements)
  - platform: resampler
    id: announcement_source_speaker
    output_speaker: announcement_mixing_input

audio:
  codecs:
    flac:
    mp3:
    wav:
      
media_player:
  - platform: speaker
    id: media_player_id
    name: Audio Player
    buffer_size: 500000
    icon: "mdi:speaker-message"
    task_stack_in_psram: true
    codec_support_enabled: false
    volume_initial: 50%
    volume_increment: 5%
    volume_min: 0%
    volume_max: 100%
    files:
      - id: snd_boot
        file: "sounds/boot.flac"
      - id: snd_va_chime_up
        file: "sounds/va_chime_up.flac"
      - id: snd_va_chime_down
        file: "sounds/va_chime_down.flac"
      - id: snd_error
        file: "sounds/error.flac"
      - id: snd_success
        file: "sounds/success.flac"
      - id: snd_va_wake
        file: "sounds/va_wake.flac"
      - id: snd_single_click
        file: "sounds/single_click.flac"
      - id: snd_double_click
        file: "sounds/double_click.flac"
      - id: snd_long_click
        file: "sounds/long_click.flac"

    media_pipeline:
      speaker: media_source_speaker
      num_channels: 2
      sample_rate: 48000
      format: MP3
    announcement_pipeline:
      speaker: announcement_source_speaker
      sample_rate: 16000
      num_channels: 1
      format: FLAC
    on_announcement:
      - logger.log: "Ducking enabled"
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.3s
      - if:
          condition:
            lambda: 'return id(skip_next_announcement);'
          then:
            # Skip aktiv → nur zurücksetzen
            - lambda: 'id(skip_next_announcement) = false;'
          else:
            # Skip NICHT aktiv → regulär ausführen
            - script.execute: on_media_player_announcement 
    on_play:
      - logger.log: "Ducking disabled"
      - micro_wake_word.stop:
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 0
          duration: 0.3s
      - script.execute: on_media_player_play
    on_pause:
      - micro_wake_word.start:
      - script.execute: on_media_player_pause
    on_idle:      
      - micro_wake_word.start:
      - script.execute: on_media_player_idle
    on_turn_on:
      - script.execute: on_media_player_turn_on
    on_turn_off:
      - script.execute: on_media_player_turn_off
    on_mute:
      - script.execute: on_media_player_mute
    on_unmute:
      - script.execute: on_media_player_unmute
    on_volume:
      - script.execute: on_media_player_volume
    on_state:
      - script.execute: on_media_player_state

voice_assistant:
  id: va
  micro_wake_word: 
  use_wake_word: false
  microphone:
    - channels: ["0"]
      microphone: hw_microphone
    - channels: ["1"]
      microphone: hw_microphone
  media_player: media_player_id
  auto_gain: 15dBFS
  conversation_timeout: 300s
  noise_suppression_level: 2
  volume_multiplier: 4

  on_client_connected: 
    - script.execute: on_voice_assistant_client_connected
  on_client_disconnected: 
    - script.execute: on_voice_assistant_client_disconnected
  on_idle: 
    - script.execute: on_voice_assistant_idle
  on_listening: 
    - script.execute: on_voice_assistant_listening
  on_start: 
    - script.execute: on_voice_assistant_start
    - globals.set: 
        id: command_message
        value: !lambda return "";
    - globals.set: 
        id: announce_message
        value: !lambda return "";
    - globals.set: 
        id: url_message
        value: !lambda return "";
    - globals.set: 
        id: error_code
        value: !lambda return "";
    - globals.set: 
        id: error_message
        value: !lambda return "";
    - globals.set: 
        id: intent_message
        value: !lambda return "";
      
  on_stt_end: 
    - globals.set: 
        id: command_message
        value: !lambda return x;
    - logger.log: 
        format: "Command %s"
        args: [ id(command_message).c_str() ]
    - script.execute: on_voice_assistant_stt_end
  on_stt_vad_start:
    - script.execute: on_voice_assistant_stt_vad_start
  on_stt_vad_end:
    - script.execute: on_voice_assistant_stt_vad_end
      
  on_tts_start:
    - globals.set: 
        id: announce_message
        value: !lambda return x;    
    - logger.log: 
        format: "Announce %s"
        args: [ id(announce_message).c_str() ]
    - script.execute: on_voice_assistant_tts_start
  on_tts_end: 
    - globals.set: 
        id: url_message
        value: !lambda return x;    
    - logger.log: 
        format: "URL %s"
        args: [ id(url_message).c_str() ]
    - script.execute: on_voice_assistant_tts_end
  on_end: 
    - script.execute: on_voice_assistant_end
    - script.wait: on_voice_assistant_end
  on_error: 
    - globals.set: 
        id: error_code
        value: !lambda return code;
    - globals.set: 
        id: error_message
        value: !lambda return message;
    - script.execute: on_voice_assistant_error
    - script.wait: on_voice_assistant_error
  # on_intent_start:
  on_intent_progress:
    - globals.set: 
        id: intent_message
        value: !lambda return x;
    - logger.log: 
        format: "Intent %s"
        args: [ id(intent_message).c_str() ]
    - script.execute: on_voice_assistant_intent
  # on_intent_end:
    
micro_wake_word:
  task_stack_in_psram: true
  vad:
    model: https://github.com/esphome/micro-wake-word-models/raw/main/models/v2/vad.json
    probability_cutoff: 80%
    sliding_window_size: 10
  models:
    - model: okay_nabu
  on_wake_word_detected:
    then:
      - script.execute:
          id: on_micro_wake_word_on_wake_word_detected
          ww: !lambda 'return wake_word;'

        
###################################### Automation

number:
  - platform: template
    id: page_info_duration
    name: "Info Speed"
    entity_category: config
    min_value: 15
    max_value: 300
    step: 15
    initial_value: 60
    optimistic: true
    restore_value: True
  
  - platform: template
    id: content_mode_select
    name: "Content Mode"
    entity_category: diagnostic
    min_value: 0
    max_value: 5
    step: 1    
    initial_value: "${CONTENT_BOOT}"
    optimistic: True
    set_action:
      - lambda: |-
          id(set_content_mode).execute(x);
  - platform: template
    id: overlay_mode_select
    name: "Overlay Mode"
    entity_category: diagnostic
    min_value: 0
    max_value: 4
    step: 1
    initial_value: "${OVERLAY_NONE}"
    set_action:
      - lambda: |-
          id(set_overlay_mode).execute(x);

script:
####################### functions
  - id: update_data
    then:
      - lambda: |-
          id(status_symbols)[0] =
            !id(wifi_id).is_connected() ? nullptr :
            id(wifi_rssi).state > -55   ? id(symbol_wifi_4) :
            id(wifi_rssi).state > -65   ? id(symbol_wifi_3) :
            id(wifi_rssi).state > -75   ? id(symbol_wifi_2) : 
                                          id(symbol_wifi_1);
          
          id(status_symbols)[1] =
            !id(api_id).is_connected()              ? nullptr :
            id(va).get_api_connection() != nullptr ? id(symbol_va) : 
                                                      id(symbol_api);
          
          id(status_symbols)[2] = 
            id(media_player_id).state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING ? id(symbol_mp_announce) :
            id(hw_speaker)->get_mute_state()                                         ? id(symbol_mute) :
            id(media_player_id).state == media_player::MEDIA_PLAYER_STATE_PLAYING    ? id(symbol_mp_play) :
            id(media_player_id).state == media_player::MEDIA_PLAYER_STATE_PAUSED     ? id(symbol_mp_pause) :
            id(media_player_id).state == media_player::MEDIA_PLAYER_STATE_IDLE       ? id(symbol_mp_idle) :
                                                                                       nullptr;
          
          id(status_symbols)[3] =
            id(hw_microphone)->get_mute_state() ? id(symbol_deaf) : 
                                                  nullptr;


          // 1. ZENTRALER RESET (Failsafe)
          // Setzt alle Texte standardmäßig leer. Ein case schreibt nur noch, was er wirklich braucht.
          id(idle_message0) = "";
          id(idle_message1) = "";
          id(idle_message2) = "";
          id(idle_message3) = "";
          
          // 2. CONTENT MODES (Nur wenn kein Overlay aktiv ist)
          if (id(overlay_mode) == ${OVERLAY_NONE}) {
            id(title_text) = id(content_mode_text)[id(content_mode)];
          
            switch (id(content_mode)) {
              case ${CONTENT_BOOT}:
                id(image_icon)    = id(logo_esphome);
                id(idle_message1) = "${version}";
                #include <esp_idf_version.h>
                id(idle_message2) = IDF_VER;
                break;
          
              case ${CONTENT_IDLE}: {
                id(image_icon) = nullptr;
                static const char* weekdays[] = {"Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"};
                auto now = id(esptime).now();
                
                int page_duration = id(page_info_duration).state * 1000;
                int idx = (millis() / page_duration) % 6;
                
                switch (idx) {
                  case 0: id(idle_message0) = str_snprintf("%02d:%02d", 32, now.hour, now.minute); break;
                  case 1: id(idle_message0) = str_snprintf("%02d.%02d.%02d", 32, now.day_of_month, now.month, now.year % 100); break;
                  case 2: id(idle_message1) = str_snprintf("%s", 32, weekdays[now.day_of_week - 1]);
                          id(idle_message2) = str_snprintf("%02d.%02d.%02d", 32, now.day_of_month, now.month, now.year % 100); break;
                  case 3: id(idle_message0) = str_snprintf("%.1f °C", 32, id(room_temp).state); break;
                  case 4: id(idle_message0) = str_snprintf("%.0f%% rF", 32, id(room_hum).state); break;
                  case 5: id(idle_message0) = str_snprintf("%.0f hPa", 32, id(room_press).state); break;
                }
                break;
              }
          
              case ${CONTENT_PLAY}:
              case ${CONTENT_PAUSE}: // Zusammengefasst, da textlich identisch
                //id(image_icon)    = (id(content_mode) == ${CONTENT_PLAY}) ? id(icon_play) : id(icon_pause);
                id(image_icon) = nullptr;
                id(idle_message1) = id(media_album_name).state;
                id(idle_message2) = id(media_title).state;
                id(idle_message3) = id(media_artist).state;
                break;
          
              case ${CONTENT_LISTEN}:
                id(image_icon)    = id(icon_listen);
                id(idle_message0) = "Ja bitte";
                break;
          
              case ${CONTENT_THINK}:
                id(image_icon)    = id(icon_think);
                id(idle_message1) = id(command_message).empty() ? "denke ..." : id(command_message);
                break;
            }
          }
          
          // 3. OVERLAY MODES (Überschreiben ggf. Titel, Icon und Texte)
          switch (id(overlay_mode)) {
            case ${OVERLAY_VOLUME}:
              id(idle_message0) = id(media_player_id).is_muted() ? "MUTE" : str_snprintf(" VOL %.0f", 32, id(media_player_id).volume * 100.0f);
              break;
          
            case ${OVERLAY_ERROR}:
              id(title_text)    = id(overlay_mode_text)[id(overlay_mode)];
              id(image_icon)    = id(icon_error);
              id(idle_message1) = id(error_code);
              id(idle_message2) = id(error_message);
              break;
          
            case ${OVERLAY_ALARM}:
            case ${OVERLAY_ANNOUNCE}: // Zusammengefasst, da identische Logik
              id(title_text)    = id(overlay_mode_text)[id(overlay_mode)];
              id(image_icon)    = (id(overlay_mode) == ${OVERLAY_ALARM}) ? id(icon_alarm) : id(icon_announce);
              id(idle_message1) = id(command_message);
              id(idle_message2) = id(announce_message);
              break;
          }
          
          // 4. DISPLAY DIREKT AKTUALISIEREN
          id(display_id).update();

          
  - id: set_content_mode
    parameters: 
      mode: int
    then:
      - logger.log:
          format: "script set_content_mode %d"
          args: [ mode ]
      - lambda: |-
          // in der Bootphase wird nix geschaltet
          if (id(is_booting)) return;

          // Mode setzen
          id(content_mode) = mode;
          // mit HA synchronisieren
          id(content_mode_select).publish_state(mode);

          if (id(overlay_mode) != ${OVERLAY_NONE}) return;

          // LED-Effekt auswählen -- CONTENT_MODE
          std::string effect = "Effect CONTENT_" + std::to_string(mode);
          id(ledstrip_id).turn_on().set_effect(effect).perform();

          id(update_data).execute();
  - id: set_overlay_mode
    parameters:
      mode: int
    then:
      - logger.log:
          format: "script set_overlay_mode %d"
          args: [ mode ]
      - lambda: |-
          // in der Bootphase wird nix geschaltet
          if (id(is_booting)) return;

          // Mode setzen
          id(overlay_mode) = mode;
          // mit HA synchronisieren
          id(overlay_mode_select).publish_state(mode);

          if(id(overlay_mode) == ${OVERLAY_NONE}) {
            mode = id(content_mode);
            // LED-Effekt auswählen -- CONTENT_MODE
            std::string effect = "Effect CONTENT_" + std::to_string(mode);
            id(ledstrip_id).turn_on().set_effect(effect).perform();
          } else {
            // LED-Effekt auswählen -- OVERLAY_MODE
            std::string effect = "Effect OVERLAY_" + std::to_string(mode);
            id(ledstrip_id).turn_on().set_effect(effect).perform();
          }

          id(update_data).execute();
          
  - id: show_volume_overlay
    mode: restart
    then:
      - logger.log:
          format: "script show_volume_overlay"
      - lambda: |-
          id(set_overlay_mode).execute(${OVERLAY_VOLUME});
      - delay: 5s
      - lambda: |-
          id(set_overlay_mode).execute(${OVERLAY_NONE});

  - id: show_error_overlay
    mode: restart
    then:
      - logger.log:
          format: "script show_error_overlay"
      - lambda: |-
          id(set_overlay_mode).execute(${OVERLAY_ERROR});
      - delay: 5s
      - lambda: |-
          id(set_overlay_mode).execute(${OVERLAY_NONE});
  - id: show_announce_overlay
    mode: restart
    then:
      - logger.log:
          format: "script show_announce_overlay"
      - lambda: |-
          id(set_overlay_mode).execute(${OVERLAY_ANNOUNCE});

      # Warten bis Announcement wirklich gestartet ist
      - wait_until:
          condition:
            media_player.is_announcing: media_player_id

      # Warten bis Announcement vorbei ist
      - wait_until:
          condition:
            not:
              media_player.is_announcing: media_player_id

      - lambda: |-
          // Overlay ausschalten
          id(set_overlay_mode).execute(${OVERLAY_NONE});



