substitutions:
  name: "esphome-web-f407a0"
  friendly_name: "Smart Speaker 2"
  
  # Pin-Belegung
  # Amp Max98357
  amp_lrclk_pin : "GPIO11"   # LEFT / RIGHT CLOCK
  amp_bclk_pin  : "GPIO10"   # Bit CLOCK
  amp_din_pin   : "GPIO09"   # DATA IN

  # Microphone INMP441
  mic_ws_pin   : "GPIO04"   # WORD SELECT
  mic_sck_pin  : "GPIO05"   # SERIAL CLOCK
  mic_sd_pin   : "GPIO06"   # SERIAL DATA
  
  # LED Strip WS2812
  led_din_pin  : "GPIO08"    # DATA IN
  led_count    : "10"        # Number of LEDs

  # I2C
  i2c_sda_pin  : "GPIO01"    # SERIAL DATA
  i2c_scl_pin  : "GPIO02"    # SERIAL CLOCK

  # Environment BME280
  bme_addr     : "0x76"

  # Display OLED SSD1306
  ssd_addr     : "0x3C"
  
  # Button TTP221
  btn_1_pin    : "GPIO15"
  btn_2_pin    : "GPIO16"
  btn_3_pin    : "GPIO17"
  btn_4_pin    : "GPIO18"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  platformio_options:
    board_build.arduino.memory_type: qio_opi
    board_build.flash_mode: dio
    build_flags: "-DBOARD_HAS_PSRAM"
  on_boot: 
    priority: 600.0
    then:
      - script.execute: set_page_boot

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  cpu_frequency: 240MHZ
  framework:
    type: esp-idf

# Stabile Aktivierung des 8MB Octal-PSRAM
psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Home Assistant API via spezifischem Secret gesichert
api:
  encryption:
    key: !secret api_encryption_key

# Korrigierte OTA-Struktur für neuere ESPHome-Versionen
ota:
  - platform: esphome

logger:
  level: DEBUG

# Zeit-Syncronisation
time:
  - platform: homeassistant
    id: esptime
    # Schaltet die Boot-Seite lautlos um, sobald die Zeit synchronisiert ist
    on_time_sync:
      then:
        - logger.log: "Time synced"
        - script.execute: set_page_standby

# Einstellung, kommt von HA
number:
  - platform: template
    name: "Info Speed"
    id: page_info_duration
    optimistic: true
    entity_category: config
    min_value: 15
    max_value: 300
    step: 15
    initial_value: 60
    restore_value: True

# Text, kommt von HA
text_sensor:
  - platform: homeassistant    
    id: media_title
    name: "Media Titel"
    entity_id: input_text.smart_speaker_media_player

  - platform: homeassistant    
    id: radio_station
    name: "Radiosender"
    entity_id: input_select.radiosender

# Aktiviert die interne Restart-Aktion in ESPHome und Home Assistant
button:
  - platform: restart
    name: "${friendly_name} Neustart"
    id: restart_button

# Gemeinsamer I2C Bus für BME280 und SSD1306 OLED
i2c:
  - sda: ${i2c_sda_pin}
    scl: ${i2c_scl_pin}
    scan: true
    frequency: 400kHz

# Physische I2S-Geräte-Busse initialisieren
i2s_audio:
  - id: i2s_bus_in
    i2s_lrclk_pin: ${mic_ws_pin}
    i2s_bclk_pin: ${mic_sck_pin}    
  - id: i2s_bus_out
    i2s_lrclk_pin: ${amp_lrclk_pin}
    i2s_bclk_pin: ${amp_bclk_pin}

# Das Stereo-Mikrofon-Array einbinden (2x INMP441)
microphone:
  - platform: i2s_audio
    id: hw_microphone
    i2s_audio_id: i2s_bus_in
    adc_type: external                 
    i2s_din_pin: ${mic_sd_pin}
    pdm: false                         
    bits_per_sample: 32bit             
    sample_rate: 16000                 
    mclk_multiple: 256                 
    channel: stereo

speaker:
  # 1. Der physische I2S Hardware-Ausgang (Stereo an beide MAX98357)
  - platform: i2s_audio
    id: hw_speaker
    i2s_audio_id: i2s_bus_out
    dac_type: external
    i2s_dout_pin: ${amp_din_pin} 
    bits_per_sample: 16bit     
    sample_rate: 48000         
    mclk_multiple: 256         
    channel: stereo
    buffer_duration: 100s

  # 2. Der digitale Audio-Mixer
  - platform: mixer
    id: audio_mixer
    task_stack_in_psram: true
    output_speaker: hw_speaker
    source_speakers:
      - id: media_mixing_input
      - id: announcement_mixing_input

  # 3. Virtueller Resampler für Musik-Medien (schreibt in den Mixer-Eingang)
  - platform: resampler
    id: media_source_speaker    
    output_speaker: media_mixing_input
    task_stack_in_psram: true

  # 4. Virtueller Resampler für Durchsagen (schreibt in den Mixer-Eingang)
  - platform: resampler
    id: announcement_source_speaker
    output_speaker: announcement_mixing_input
    task_stack_in_psram: true

# Zentrales Steuerungs-Skript für Popups
script:
  - id: set_page_boot
    mode: single
    then:
      - logger.log: "page boot"
      - display.page.show: page_boot
      - component.update: oled_display
      - light.turn_on: 
          id: led_strip
          red: 0%
          green: 0%
          blue: 100%
          brightness: 50%
          # flash_length: 1s
  - id: set_page_standby
    mode: single
    then:
      - if:
          condition:
            not:
              - display.is_displaying_page:
                  id: oled_display
                  page_id: page_volume
          then:
            - logger.log: "page standby"
            - display.page.show: page_info
            - component.update: oled_display
            - light.turn_off: led_strip
          else:
            - logger.log: "set_page_standby blockiert, weil volume aktiv"

  - id: set_page_player
    mode: single
    then:
      - if:
          condition:
            not:
              - display.is_displaying_page:
                  id: oled_display
                  page_id: page_volume
          then:
            - logger.log: "page player"
            - display.page.show: page_audio
            - component.update: oled_display
            - light.turn_on: 
                id: led_strip
                red: 0%
                green: 100%
                blue: 0%
                brightness: 50%
                flash_length: 1s
          else:
            - logger.log: "set_page_player blockiert, weil volume aktiv"

  - id: set_state_announce
    mode: single
    then: 
      - if:
          condition:
            not:
              - display.is_displaying_page:
                  id: oled_display
                  page_id: page_volume
          then:
            - logger.log: "state announce"
            - display.page.show: page_audio
            - component.update: oled_display
            - light.turn_on:
                id: led_strip
                red: 100%
                green: 0%
                blue: 0%
                effect: "Pulse"
          else:
            - logger.log: "set_state_announce blockiert, because volume aktiv"

  - id: set_state_play
    mode: single
    then: 
      - if:
          condition:
            not:
              - display.is_displaying_page:
                  id: oled_display
                  page_id: page_volume
          then:
            - logger.log: "state play"
            - display.page.show: page_audio
            - component.update: oled_display
            - light.turn_on:
                id: led_strip
                effect: "Rainbow"
          else:
            - logger.log: "set_state_play blockiert, weil volume aktiv"

  - id: set_state_pause
    mode: single
    then: 
      - if:
          condition:
            not:
              - display.is_displaying_page:
                  id: oled_display
                  page_id: page_volume
          then:
            - logger.log: "state pause"
            - display.page.show: page_audio
            - component.update: oled_display
            - light.turn_on:
                id: led_strip
                red: 0%
                green: 50%
                blue: 0%
                effect: "Pulse"
          else:
            - logger.log: "set_state_pause blockiert, weil volume aktiv"

  - id: set_state_idle
    mode: single
    then: 
      - if:
          condition:
            not:
              - display.is_displaying_page:
                  id: oled_display
                  page_id: page_volume
          then:
            - logger.log: "state idle"
            - display.page.show: page_audio
            - component.update: oled_display
            - light.turn_off:
                id: led_strip
          else:
            - logger.log: "set_state_idle blockiert, weil volume aktiv"
  - id: update_page
    mode: single
    then: 
      - lambda: |-
          ESP_LOGD("volume_script", "State-Machine: Auswerten des Media Player Status...");
          
          // Saubere und performante switch/case Struktur basierend auf dem C++ Enum
          switch (id(smart_speaker_media_player)->state) {
            
            case media_player::MEDIA_PLAYER_STATE_OFF:
              id(set_page_standby).execute();
              break;
              
            case media_player::MEDIA_PLAYER_STATE_PLAYING:
              id(set_state_play).execute();
              break;
              
            case media_player::MEDIA_PLAYER_STATE_PAUSED:
              id(set_state_pause).execute();
              break;
              
            case media_player::MEDIA_PLAYER_STATE_IDLE:
            default:
              id(set_state_idle).execute();
              break;
          }
  - id: show_volume_overlay
    mode: restart
    then:      
      # 0) Wenn wir auf der Boot-Seite sind → Overlay abbrechen
      - if:
          condition:
            display.is_displaying_page:
              id: oled_display
              page_id: page_boot
          then:
            - logger.log: "Volume-Popup auf Boot-Seite blockiert"
          else:
            - logger.log: "Volume-Popup aktiv / verlaengert."

            # 1) Volume-Page anzeigen und Hardware-Refresh erzwingen
            - logger.log: "1"
            - display.page.show: page_volume
            - logger.log: "2"
            - component.update: oled_display

            # 2) Volume-Effekt aktivieren
            - logger.log: "3"
            - light.turn_on:
                id: led_strip
                effect: "Volume"

            # 3) Nicht-blockierendes Warten in YAML (wird durch mode: restart perfekt zurückgesetzt)
            - logger.log: "4"
            - delay: 5s

            - logger.log: "5"
            - logger.log: "5 Sekunden ungestoert abgelaufen. Verlasse Volume-Seite."
            
            # 4) Übergabe an Ihre State-Machine zum Wiederherstellen von Page und LED
            - logger.log: "6"
            - display.page.show: page_boot
            - script.execute: update_page

audio:
  codecs: 
    flac:
    mp3:
    wav:

# 5. Die finale Zuweisung an den Media Player mit PSRAM-Auslagerung und Puffer
media_player:
  - platform: speaker
    id: smart_speaker_media_player
    name: "${friendly_name} Audio"
    buffer_size: 1000000
    task_stack_in_psram: true

    volume_initial: 50%
    volume_min: 0%
    volume_max: 100%
    volume_increment: 5%

    on_volume:
      then:
        - logger.log: "on_volume"
        - script.execute: show_volume_overlay 

    on_mute:
      then:
        - logger.log: "on_mute"
        - script.execute: show_volume_overlay

    on_unmute:
      then:
        - logger.log: "on_unmute"
        - script.execute: show_volume_overlay

    on_announcement: 
      then:
        - logger.log: "on_announcement"
        - script.execute: set_state_announce
    on_play: 
      then:
        - logger.log: "on_play"
        - script.execute: set_state_play
    on_pause: 
      then:
        - logger.log: "on_pause"
        - script.execute: set_state_pause        
    on_idle:
      then:
        - logger.log: "on_idle"
        - script.execute: set_state_idle
        
    on_turn_on:
      then:
        - logger.log: "on_turn_on"
        - script.execute: set_page_player
      
    on_turn_off:
      then:
        - logger.log: "on_turn_off"
        - script.execute: set_page_standby

    announcement_pipeline:
      speaker: announcement_source_speaker
      format: FLAC
      sample_rate: 16000
    media_pipeline:
      speaker: media_source_speaker
      format: NONE
      sample_rate: 44100


# Adressierbares LED-Band (WS2812 via RMT-Schnittstelle im ESP-IDF Framework)
light:
  - platform: esp32_rmt_led_strip
    chipset: WS2812
    pin: ${led_din_pin}
    num_leds: ${led_count}
    rgb_order: GRB
    name: "${friendly_name} LED Ring"
    id: led_strip
    restore_mode: ALWAYS_OFF
    
    # Offiziell unterstützte, fehlerfreie Effekte für Ihren Smart Speaker LED-Ring
    effects:
      # --- PASSIF-EFFEKT: Stufenloser Pegel mit anteiliger Helligkeit der Spitzen-LED ---
      - addressable_lambda:
          name: "Volume"
          update_interval: 50ms
          lambda: |-
            float vol = id(smart_speaker_media_player)->volume;
            if (id(smart_speaker_media_player)->is_muted()) {
              vol = 0.0f;
            }
            
            // Rechnet den Pegel stufenlos auf eine Fließkommazahl von 0.0 bis 10.0 um
            float led_index_exact = vol * 10.0f;
            
            // Schleife läuft von LED 9 (rechts) runter zu LED 0 (links)
            for (int i = 0; i < 10; i++) {
              // Wir transformieren den Schleifenindex passend für Ihren Rückwärtslauf
              int target_index = 9 - i;
              
              if (target_index < led_index_exact) {
                // Berechnet, wie weit diese spezifische LED im "Übergang" liegt (0.0 bis 1.0)
                float remainder = led_index_exact - target_index;
                if (remainder > 1.0f) remainder = 1.0f; // Voll an für darunterliegende LEDs
                
                // Färbt die LED ein und skaliert die Farbe mit der anteiligen Helligkeit
                it[i] = esphome::Color(
                  (uint8_t)(0   * remainder), // Rot-Anteil gedimmt
                  (uint8_t)(180 * remainder), // Green-Anteil gedimmt
                  (uint8_t)(255 * remainder)  // Blue-Anteil gedimmt
                );
              } else {
                it[i] = esphome::Color(0, 0, 0);
              }
            }

      - addressable_rainbow:
          name: "Rainbow"
          speed: 20
          width: 25
      - pulse:
          name: "Pulse"
          min_brightness: 25%
          max_brightness: 75%
          transition_length: 1s
          update_interval: 2s

      # KITT / Lauflicht (Perfekt für "Sprachassistent denkt nach")
      - addressable_scan:
          name: "Scan"
          move_interval: 100ms
          scan_width: 2

      # Gemütliches, zufälliges Aufblitzen im Raum
      - addressable_twinkle:
          name: "Funkeln"
          twinkle_probability: 5%
          progress_interval: 50ms

      # Der korrekte Feuerwerks-Effekt (Höherer fade_out_rate = schnelleres Verblassen)
      - addressable_fireworks:
          name: "Feuerwerk"
          update_interval: 32ms
          spark_probability: 10%
          use_random_color: true
          fade_out_rate: 120

      # Farb-Lauflicht (Kombiniert mit der korrekten Geschwindigkeitseinstellung)
      - addressable_color_wipe:
          name: "Farblauf"          
          add_led_interval: 100ms 
          reverse: True

# Sensoren (BME280 & PSRAM-Diagnose)
sensor:
  - platform: bme280_i2c
    address: ${bme_addr}
    update_interval: 5s
    temperature:
      name: "${friendly_name} Temperatur"
      id: room_temp
    pressure:
      name: "${friendly_name} Luftdruck"
      id: room_press
    humidity:
      name: "${friendly_name} Luftfeuchtigkeit"
      id: room_hum      

  - platform: uptime
    id: system_uptime
    update_interval: 1s

# TTP221 Kapazitive Touch-Tasten
binary_sensor:
  - platform: gpio
    pin: ${btn_1_pin}
    name: "${friendly_name} Taste 1 (Wiedergabe Pause)"
    on_click:
      min_length: 50ms
      max_length: 500ms
      then:
      - media_player.toggle: smart_speaker_media_player
  - platform: gpio
    pin: ${btn_2_pin}
    name: "${friendly_name} Taste 2 (Power)"
    on_click: 
      min_length: 750ms
      max_length: 1500ms
      then:
        - if:
            condition:
              - media_player.is_off: smart_speaker_media_player
            then:
              - media_player.turn_on: smart_speaker_media_player
            else:
              - media_player.turn_off: smart_speaker_media_player
  - platform: gpio
    pin: ${btn_3_pin}
    name: "${friendly_name} Taste 3 (Lautstärke -)"
    on_click:
      - min_length: 50ms
        max_length: 500ms
        then:
          - media_player.volume_down: smart_speaker_media_player
      - min_length: 750ms
        max_length: 1500ms
        then:
          - if:
              condition:
              - media_player.is_muted: smart_speaker_media_player
              then:
                - media_player.unmute: smart_speaker_media_player
              else:
                - media_player.mute: smart_speaker_media_player        
  - platform: gpio
    pin: ${btn_4_pin}
    name: "${friendly_name} Taste 4 (Lautstärke +)"
    on_click:
      min_length: 50ms
      max_length: 500ms
      then:
      - media_player.volume_up: smart_speaker_media_player

# Konfiguration der Temperatur-Kurve für das OLED-Display
graph:
  - id: temp_graph
    sensor: room_temp          # Koppelt den Graphen an Ihren BME280 Temperatursensor
    duration: 1h               # Zeigt den Verlauf der letzten Stunde (z.B. auch 6h oder 12h möglich)
    width: 128                 # Nutzt die volle Breite des Displays
    height: 30                 # Passt perfekt in die untere Displayhälfte (max. 32 Pixel)
    border: false              # Verhindert einen dicken Rahmen für maximale Zeichenfläche
    line_thickness: 1          # Eine feine Pixel-Linie für optimale Schärfe
    # Optimiert die vertikale Achse, damit die Kurve sofort sichtbar im Fokus liegt
    min_value: 15.0
    max_value: 35.0
    # x_grid: 15min
    y_grid: 10                 # degC
      

# Standardschriften für lesbare Pages
font:
  - file: "gfonts://Ubuntu"
    id: font_small
    size: 9
  - file: "gfonts://Ubuntu"
    id: font_medium
    size: 15
  - file: "gfonts://Ubuntu"
    id: font_large
    size: 22
  - file: "gfonts://Ubuntu"
    id: font_huge
    size: 30

# MDI-Icons automatisch aus dem Home Assistant Repository laden und skalieren
# Maximal optimierte MDI-Icons im binären Monochrom-Format (0 oder 1)
image:
  - file: "https://media.esphome.io/logo/vertical/Logo%20Vertical%20-%20Monochrome%20Blue.svg"
    id: logo_esphome
    type: binary
    resize: 44x44
    invert_alpha: False
  - file: "mdi:wifi"
    id: icon_wifi
    type: binary
    resize: 16x16
  - file: "mdi:wifi-off"
    id: icon_wifi_off
    type: binary
    resize: 16x16
  - file: "mdi:home-automation"
    id: icon_api
    type: binary
    resize: 16x16
  - file: "mdi:volume-high"
    id: icon_audio
    type: binary
    resize: 16x16
  - file: "mdi:volume-off"
    id: icon_mute
    type: binary
    resize: 16x16
  - file: "mdi:microphone-off"
    id: icon_deaf
    type: binary
    resize: 16x16

# SSD1306 OLED Display mit zweifarbiger Aufteilung und korrigierter C++is_muted() Methode
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: ${ssd_addr}
    id: oled_display
    update_interval: 1s

    pages:
      # --- SEITE 0: BOOT MODUS (Aktiv direkt nach dem Einschalten) ---
      - id: page_boot
        lambda: |-
          // 1. GELBER BEREICH (Pixel 0 bis 15): Netzwerksuche visualisieren
          if (wifi::global_wifi_component->is_connected()) it.image(112, 0, id(icon_wifi));          
          if (api::global_api_server->is_connected()) it.image(96, 0, id(icon_api));
          
          it.print(0, 0, id(font_medium), "BOOTING");
          it.line(0, 16, 128, 16);
          
          // 2. BLAUER BEREICH (Ab Pixel 20)
          it.image(42,20, id(logo_esphome));

      # --- SEITE 1: INFO MODUS (6 rotierende Unterseiten mit zentrierter Ansicht) ---
      - id: page_info
        lambda: |-
          // 1. GELBER BEREICH (Pixel 0 bis 15): Statussymbole zeichnen (Immer aktiv)
          if (wifi::global_wifi_component->is_connected()) it.image(112, 0, id(icon_wifi));
          if (api::global_api_server->is_connected()) it.image(96, 0, id(icon_api));
          if (id(smart_speaker_media_player)->is_muted()) it.image(80, 0, id(icon_mute));
          if (id(hw_microphone)->get_mute_state()) it.image(64, 0, id(icon_deaf));
          
          it.print(0, 0, id(font_medium), "INFO");
          it.line(0, 16, 128, 16); // Physische Trennlinie zwischen Gelb und Blau

          // 2. BLAUER BEREICH (Ab Pixel 20): Darstellung Infos auf Unterseiten
          auto time_now = id(esptime).now();
          
          // 7 Unterseiten
          int page_duration = id(page_info_duration).state * 1000;
          int active_subpage = (esphome::millis() / page_duration) % 7;

          // DEUTSCHE WOCHENTAGE: Array definiert (Index 0 = Ungültig, 1 = Sonntag, 2 = Montag, ..., 7 = Samstag)
          static const char* DE_WD[] = {"", "So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"};
          static const char* DE_WEEKDAYS[] = {"", "Sonntag", "Montag", "Diensttag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"};

          switch (active_subpage) {
            
            case 0:
              // --- UNTERSEITE 1: Uhrzeit groß, Datum klein ---
              if (time_now.is_valid()) {
                it.strftime(64, 34, id(font_huge), esphome::display::TextAlign::CENTER, "%H:%M", time_now);
                it.strftime(64, 56, id(font_medium), esphome::display::TextAlign::CENTER, "%d.%m.%Y", time_now);
              }
              break;

            case 1:
              // --- UNTERSEITE 2: Datum groß, Uhrzeit klein (font_huge für das Datum angepasst) ---
              if (time_now.is_valid()) {
                it.strftime(64, 34, id(font_huge), esphome::display::TextAlign::CENTER, "%d.%m.", time_now);
                it.strftime(64, 56, id(font_medium), esphome::display::TextAlign::CENTER, "%H:%M", time_now);
              }
              break;

            case 2:
              // --- UNTERSEITE 3: Wochentag groß, Uhrzeit & Datum kompakt ---
              if (time_now.is_valid()) {
              //  it.strftime(64, 34, id(font_huge), esphome::display::TextAlign::CENTER, "%a", time_now);
                it.print(64, 34, id(font_huge), esphome::display::TextAlign::CENTER, DE_WEEKDAYS[time_now.day_of_week]);
                it.strftime(64, 56, id(font_medium), esphome::display::TextAlign::CENTER, "%H:%M | %d.%m.%Y", time_now);
              }
              break;

            case 3:
              // --- UNTERSEITE 4: Fokus auf Temperatur ---
              if (!isnan(id(room_temp).state)) {
                it.printf(64, 34, id(font_huge), esphome::display::TextAlign::CENTER, "%.1f°C", id(room_temp).state);
              }
              if (!isnan(id(room_hum).state) && !isnan(id(room_press).state)) {
                it.printf(64, 56, id(font_medium), esphome::display::TextAlign::CENTER, "%.0f%% | %.0f hPa", id(room_hum).state, id(room_press).state);
              }
              break;

            case 4:
              // --- UNTERSEITE 5: Fokus auf Luftfeuchtigkeit (KORRIGIERT: Eigener Case 4) ---
              if (!isnan(id(room_hum).state)) {
                it.printf(64, 34, id(font_huge), esphome::display::TextAlign::CENTER, "%.0f%% rF", id(room_hum).state);
              }
              if (!isnan(id(room_temp).state) && !isnan(id(room_press).state)) {
                it.printf(64, 56, id(font_medium), esphome::display::TextAlign::CENTER, "%.1f°C | %.0f hPa", id(room_temp).state, id(room_press).state);
              }
              break;

            case 5:
              // --- UNTERSEITE 6: Fokus auf Luftdruck (KORRIGIERT: Eigener Case 5) ---
              if (!isnan(id(room_press).state)) {
                it.printf(64, 34, id(font_huge), esphome::display::TextAlign::CENTER, "%.0f hPa", id(room_press).state);
              }
              if (!isnan(id(room_hum).state) && !isnan(id(room_temp).state)) {
                it.printf(64, 56, id(font_medium), esphome::display::TextAlign::CENTER, "%.0f%% | %.1f°C", id(room_hum).state, id(room_temp).state);
              }
              break;

            case 6:
              // --- UNTERSEITE 7: Dynamischer Temperatur-Graph ---
              if (!isnan(id(room_temp).state)) {
                // Gibt die aktuelle Temperatur klein als Überschrift über dem Graphen aus (Y=18)
                it.printf(64, 24, id(font_small), esphome::display::TextAlign::CENTER, "Trend: %.1f°C", id(room_temp).state);
              }
              // Zeichnet die Kurve in den verbleibenden Platz (X=0, Y=34 bis 64)
              it.graph(0, 34, id(temp_graph));
              break;

            default:
              break;
          }


      # --- SEITE 2: AUDIO MODUS (Gelbe Icons + Blaue Audio-Anzeige) ---
      - id: page_audio
        lambda: |-
          // 1. GELBER BEREICH (Pixel 0 bis 15): MDI-Icons zeichnen
          if (wifi::global_wifi_component->is_connected()) it.image(112, 0, id(icon_wifi));
          if (api::global_api_server->is_connected()) it.image(96, 0, id(icon_api));
          if (id(smart_speaker_media_player)->is_muted()) it.image(80, 0, id(icon_mute));
          if (id(hw_microphone)->get_mute_state()) it.image(64, 0, id(icon_deaf));
          
          it.print(0, 0, id(font_medium), "AUDIO");
          it.line(0, 16, 128, 16); // Physische Trennlinie zwischen Gelb und Blau
                   
          // 2. BLAUER BEREICH (Ab Pixel 20)
          if (id(smart_speaker_media_player)->state == media_player::MEDIA_PLAYER_STATE_PLAYING) {
            it.print(64, 48, id(font_medium), TextAlign::CENTER, id(radio_station).state.c_str());
          } else if (id(smart_speaker_media_player)->state == media_player::MEDIA_PLAYER_STATE_PAUSED) {
            it.print(64, 38, id(font_huge), TextAlign::CENTER, "PAUSED");
          } else {
            it.print(64, 38, id(font_huge), TextAlign::CENTER, "IDLE");
          }
          
      # --- SEITE 3: VOLUME MODUS (Aktiviert für 5 Sekunden bei Änderung) ---
      - id: page_volume
        lambda: |-
          // 1. GELBER BEREICH (Pixel 0 bis 15): MDI-Icons zeichnen
          if (wifi::global_wifi_component->is_connected()) it.image(112, 0, id(icon_wifi));
          if (api::global_api_server->is_connected()) it.image(96, 0, id(icon_api));
          if (id(smart_speaker_media_player)->is_muted()) it.image(80, 0, id(icon_mute));
          if (id(hw_microphone)->get_mute_state()) it.image(64, 0, id(icon_deaf));

          it.print(0, 0, id(font_medium), "VOLUME");
          it.line(0, 16, 128, 16); // Physische Trennlinie zwischen Gelb und Blau
          
          // 2. BLAUER BEREICH (Ab Pixel 20)

          // Lautstärke auslesen (Wert ist zwischen 0.0 und 1.0, wir rechnen ihn in % um)
          float vol_pct = id(smart_speaker_media_player)->volume * 100.0f;
          
          if (id(smart_speaker_media_player)->is_muted()) {
            it.print(0, 20, id(font_huge), "MUTE");
          } else {
            it.printf(0, 20, id(font_huge), "VOL %.0f%%", vol_pct);
          }
